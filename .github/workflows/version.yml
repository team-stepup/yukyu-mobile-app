name: Update version.json

on:
  push:
    branches: [main]
    paths:
      - 'index.html'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate version.json
        run: |
          VERSION=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MSG=$(git log -1 --pretty=%s | sed 's/"/\\"/g' | head -c 200)
          echo "{\"version\":\"${VERSION}\",\"timestamp\":\"${TIMESTAMP}\",\"message\":\"${MSG}\"}" > version.json

      - name: Inject build version into index.html
        run: |
          VERSION=$(git rev-parse --short HEAD)
          # Replace the placeholder string with the actual short SHA
          sed -i "s/__APP_BUILD_VERSION__/${VERSION}/g" index.html

      - name: Commit version.json and index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json index.html
          git diff --cached --quiet || git commit -m "auto: update version.json [skip ci]"
          git push
