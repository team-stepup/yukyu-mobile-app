async function ensureHakenKeyMap() {
  if (hakenKeyMap) return hakenKeyMap;
  const meta = await fetchEmployeeFields();
  if (meta) {
    hakenKeyMap = buildFieldKeyMap(meta);
  }
  return hakenKeyMap;
}

function getFieldValueForTable(emp, field, keyMap) {
  // Handle calc fields
  if (field.key === '_calcAge') {
    const bdKey = keyMap['birthday'];
    if (!bdKey || !emp[bdKey]) return '';
    const bd = new Date(emp[bdKey]);
    const now = new Date();
    let age = now.getFullYear() - bd.getFullYear();
    const m = now.getMonth() - bd.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < bd.getDate())) age--;
    return age + '歳';
  }
  if (field.key === '_calcTenure') return ''; // skip complex calc in table
  const odataKey = keyMap[field.key];
  if (!odataKey) return '';
  const val = emp[odataKey];
  if (val === null || val === undefined || val === '') return '';
  // Plain text for table (strip HTML)
  if (field.format === 'date' || field.format === 'dateExpiry') return formatDate(val);
  if (field.format === 'currency') {
    const num = parseFloat(val);
    return isNaN(num) ? String(val) : '¥' + Math.round(num).toLocaleString();
  }
  if (field.format === 'spUrl' && typeof val === 'object' && val.Url) return val.Description || val.Url;
  return String(val);
}

function renderHakenTable(employees, container) {
  if (employees.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>該当する社員がいません</p></div>';
    return;
  }

  // Build extra columns from selected categories
  const extraCols = [];
  if (hakenSelectedCols.length > 0 && hakenKeyMap) {
    hakenSelectedCols.forEach(catId => {
      const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      cat.fields.forEach(f => {
        if (f.key === '_calcTenure') return; // skip
        extraCols.push({ catId, field: f });
      });
    });
  }

  let html = '<table class="haken-table"><thead><tr>' +
    '<th>氏名</th><th>社番</th><th>通勤方法</th><th>在職</th>';
  extraCols.forEach(col => {
    html += '<th>' + escHtml(col.field.label) + '</th>';
  });
  html += '</tr></thead><tbody>';

  employees.forEach(emp => {
    const tsukin = getTsukinValue(emp);
    const resigned = isResigned(emp);
    const tsukinDisplay = tsukin ? escHtml(tsukin) : '<span style="color:var(--warning);font-weight:600;">⚠未登録</span>';
    const statusDisplay = resigned ? '<span style="color:var(--danger);">退社</span>' : '<span style="color:var(--success);">在職</span>';
    html += '<tr onclick=\'selectEmployee(' + JSON.stringify(emp).replace(/'/g, "&#39;") + ')\' style="cursor:pointer;">' +
      '<td style="font-weight:600;">' + escHtml(emp.Title || '') + '</td>' +
      '<td>' + (emp[F.syainNo] || '') + '</td>' +
      '<td>' + tsukinDisplay + '</td>' +
      '<td>' + statusDisplay + '</td>';
    extraCols.forEach(col => {
      html += '<td>' + escHtml(getFieldValueForTable(emp, col.field, hakenKeyMap)) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function downloadHakenExcel() {
  // Get currently displayed employees based on filter
  let data = hakenEmployeesCache;
  if (hakenCurrentFilter === 'sougei') {
    data = data.filter(emp => getTsukinValue(emp).indexOf('送迎') >= 0);
  } else if (hakenCurrentFilter === 'other') {
    data = data.filter(emp => { const t = getTsukinValue(emp); return t && t.indexOf('送迎') < 0; });
  } else if (hakenCurrentFilter === 'empty') {
    data = data.filter(emp => !getTsukinValue(emp));
  }

  const buka = document.getElementById('hakenSelect').value || '部課';

  // Build extra columns from selected categories
  const extraCols = [];
  if (hakenSelectedCols.length > 0 && hakenKeyMap) {
    hakenSelectedCols.forEach(catId => {
      const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      cat.fields.forEach(f => {
        if (f.key === '_calcTenure') return;
        extraCols.push({ field: f });
      });
    });
  }

  // Build CSV with BOM for Excel Japanese support
  const BOM = '\uFEFF';
  const headers = ['氏名', '社員番号', '通勤方法', '在職状態', '部課'];
  extraCols.forEach(col => headers.push(col.field.label));
  const rows = data.map(emp => {
    const tsukin = getTsukinValue(emp);
    const status = isResigned(emp) ? '退社' : '在職';
    const base = [
      '"' + (emp.Title || '').replace(/"/g, '""') + '"',
      emp[F.syainNo] || '',
      '"' + tsukin.replace(/"/g, '""') + '"',
      status,
      '"' + buka.replace(/"/g, '""') + '"'
    ];
    extraCols.forEach(col => {
      const val = hakenKeyMap ? getFieldValueForTable(emp, col.field, hakenKeyMap) : '';
      base.push('"' + val.replace(/"/g, '""') + '"');
    });
    return base.join(',');
  });

  const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = buka + '_社員一覧.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('ダウンロードしました', 'success');
}

// Enter key search + clear button toggle
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchEmployee();
});
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('searchClearBtn').style.display = this.value ? 'block' : 'none';
});

// Initialize
initMsal();
</script>
