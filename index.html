async function generateDattaiDocument() {
  try {
    var kigou = document.getElementById('dattai_kigou').value;
    var bangou = document.getElementById('dattai_bangou').value;
    var hokenshaNo = document.getElementById('dattai_hokenshaNo').value;
    var jigyousho = document.getElementById('dattai_jigyousho').value;
    var shimei = document.getElementById('dattai_shimei').value;
    var birthday = document.getElementById('dattai_birthday').value;
    var shutoku = document.getElementById('dattai_shutoku').value;
    var soushitsu = document.getElementById('dattai_soushitsu').value;
    var emp = currentEmployee;
    var yukyuTD = emp && emp[F.yukyuTaisha] ? emp[F.yukyuTaisha].substring(0, 10) : '';
    var hakenTD = emp && emp[F.hakenTaisha] ? emp[F.hakenTaisha].substring(0, 10) : '';
    var taishaDate = yukyuTD || hakenTD;
    if (!shimei) { showToast('氏名を入力してください', 'error'); return; }
    if (!soushitsu) { showToast('資格喪失年月日を入力してください', 'error'); return; }
    var fuyouRowEls = document.querySelectorAll('.dattai-fuyou-row');
    var fuyouList = [];
    fuyouRowEls.forEach(function(row) {
      var fn = row.querySelector('.dattai-fuyou-name').value || '';
      var fbd = row.querySelector('.dattai-fuyou-bd').value || '';
      var fso = row.querySelector('.dattai-fuyou-soushitsu').value || '';
      if (fn) fuyouList.push({ name: fn, birthday: fbd, soushitsu: fso });
    });
    var todayW = toWareki(toLocalDateStr(new Date()));
    function wD(ds) { return ds ? toWareki(ds) : null; }
    var bdW = wD(birthday), soW = wD(soushitsu), taW = wD(taishaDate), shW = wD(shutoku);

    showToast('PDF生成中...', 'info');

    // Load pdf-lib
    var PDFLib = window.PDFLib || window['pdf-lib'];
    var pdfDoc = await PDFLib.PDFDocument.load(Uint8Array.from(atob(DATTAI_PDF_B64), function(c) { return c.charCodeAt(0); }));
    pdfDoc.registerFontkit(window.fontkit);

    // Load font
    var fontBytes = Uint8Array.from(atob(FONT_SUBSET_B64), function(c) { return c.charCodeAt(0); });
    var font = await pdfDoc.embedFont(fontBytes);

    var page = pdfDoc.getPages()[0];
    var H = 842; // A4 height in points
    var rgb = PDFLib.rgb;
    var black = rgb(0, 0, 0);
    var red = rgb(1, 0, 0);

    // Helper: draw text (PyMuPDF coords -> pdf-lib coords)
    // PyMuPDF y = top-down baseline; pdf-lib y = bottom-up baseline
    // For pdf-lib: y = H - pymupdf_y
    function txt(x, py, text, sz, color) {
      if (!text && text !== 0) return;
      page.drawText(String(text), { x: x, y: H - py, size: sz || 7, font: font, color: color || black });
    }

    // Helper: draw ellipse (PyMuPDF rect coords)
    function oval(x0, y0, x1, y1, w, color) {
      var cx = (x0 + x1) / 2, cy = H - (y0 + y1) / 2;
      var rx = (x1 - x0) / 2, ry = (y1 - y0) / 2;
      page.drawEllipse({ x: cx, y: cy, xScale: rx, yScale: ry, borderColor: color || red, borderWidth: w || 1.5, color: undefined });
    }

    // Helper: draw checkmark as "✓" text
    function check(x, py) {
      txt(x, py, '✓', 10, black);
    }

    // === UPPER SECTION: Checkbox ===
    // □ at x=136.3-147.3, y=74.3-85.3
    check(137, 84);

    // === HEADER ROW (y=336-363) ===
    // 記号 centered in x=128-294
    if (kigou) {
      var kw = font.widthOfTextAtSize(kigou, 11);
      txt((128 + 294 - kw) / 2, 355, kigou, 11);
    }
    // 番号 centered in x=316-482
    if (bangou) {
      var bw = font.widthOfTextAtSize(bangou, 11);
      txt((316 + 482 - bw) / 2, 355, bangou, 11);
    }

    // === 保険者番号 8桁 ===
    // Boxes at y=385-413, 8 cells with dividers at:
    // x= 405, 422, 438, 454.6, 472.6, 487.7, 504.2, 522.2, 537.8
    // Cell centers: 413.5, 430, 446.3, 462.2, 480.2, 496.0, 511.8, 530.0
    if (hokenshaNo) {
      var hDigits = hokenshaNo.replace(/[^0-9]/g, '');
      var hCenters = [413.5, 430, 446.3, 462.2, 480.2, 496.0, 511.8, 530.0];
      var hY = 403;
      for (var hi = 0; hi < Math.min(hDigits.length, 8); hi++) {
        var dw = font.widthOfTextAtSize(hDigits[hi], 8);
        txt(hCenters[hi] - dw / 2, hY, hDigits[hi], 8);
      }
    }

    // === 保険者名 SECTION (y=363-420) ===
    // Circle 全国健康保険協会 (text at ~229,370)
    oval(225, 366, 292, 382, 1.5, red);
    // 支部名 - centered in the blank space, lower position
    // The blank area is roughly x=292-380, vertical center ~y=398
    if (jigyousho) {
      var jw = font.widthOfTextAtSize(jigyousho, 7);
      txt((292 + 380 - jw) / 2, 400, jigyousho, 7);
    }

    // === 被保険者 SECTION (y=420-464) ===
    // 氏名 (x=107-289, y=420-464) - centered horizontally, vertical center ~y=453
    if (shimei) {
      var sw = font.widthOfTextAtSize(shimei, 9);
      txt((107 + 289 - sw) / 2, 453, shimei, 9);
    }

    // 生年月日 (x=289-394)
    // Era labels: 昭和 y≈432, 平成 y≈443, 令和 y≈454
    // 年 at x=329, 月 at x=357, 日 at x=385 - numbers aligned with labels
    if (bdW && bdW.era) {
      var eraMap = { '昭和': 429, '平成': 440, '令和': 451 };
      var ey = eraMap[bdW.era];
      if (ey) oval(290, ey, 312, ey + 13, 1.2, red);
      // Place numbers at the era's row, aligned with 年月日 labels (y+11 for baseline)
      txt(318, ey + 11, bdW.year, 7);
      txt(348, ey + 11, bdW.month, 7);
      txt(377, ey + 11, bdW.day, 7);
    }

    // 資格取得 (x=394-538, y=420-441)
    // Eras: 平成 at y≈422, 令和 at y≈432. Keep circles within y=420-441
    if (shW && shW.era) {
      var shutokuEraMap = { '平成': 420, '令和': 430 };
      var sey = shutokuEraMap[shW.era] || 420;
      oval(434, sey, 454, sey + 11, 1.0, red);
      txt(460, 436, shW.year, 7);
      txt(490, 436, shW.month, 7);
      txt(518, 436, shW.day, 7);
    }

    // 資格喪失 (x=394-538, y=441-464)
    // Always circle 令和 ONLY (fixed, no 平成 circle)
    if (soW && soW.era) {
      oval(434, 452, 454, 463, 1.0, red); // 令和 only
      txt(460, 459, soW.year, 7);
      txt(490, 459, soW.month, 7);
      txt(518, 459, soW.day, 7);
    }

    // === 被扶養者 ROWS ===
    // Row base Y positions: 485, 517, 549, 581 (each row height ~32pt)
    var fuyouBaseY = [485, 517, 549, 581];
    for (var fi = 0; fi < 4; fi++) {
      var f = fuyouList[fi];
      if (!f) continue;
      var fy = fuyouBaseY[fi];
      var fMid = fy + 16; // vertical center of row

      // Name (x=107-289)
      txt(115, fMid + 4, f.name, 7);

      // Birthday (x=289-394)
      var fbW = wD(f.birthday);
      if (fbW && fbW.era) {
        txt(295, fMid + 4, fbW.era, 5.5);
        txt(318, fMid + 4, fbW.year, 6);
        txt(348, fMid + 4, fbW.month, 6);
        txt(377, fMid + 4, fbW.day, 6);
      }

      // Soushitsu date (x=432-538)
      var fsW = wD(f.soushitsu);
      if (fsW && fsW.era) {
        // Era boxes in fuyou section
        // From rects: multiple small rects at x=432-537 for each fuyou row
        // Era labels at x=437, dates at x=473, 501, 528
        txt(438, fMid + 4, fsW.era, 5.5);
        txt(473, fMid + 4, fsW.year, 6);
        txt(500, fMid + 4, fsW.month, 6);
        txt(528, fMid + 4, fsW.day, 6);
      }
    }

    // === 資格喪失原因 (y=614-657) ===
    // Reason 1: 被保険者の退職
    check(108, 623);

    // 退職日 (平成・令和 年月日)
    if (taW && taW.era) {
      // Circle the era: 平成 or 令和 in the reason text
      // '平成・令和' text at x≈236, y≈616
      if (taW.era === '平成') oval(232, 613, 256, 626, 1.0, red);
      else if (taW.era === '令和') oval(255, 613, 274, 626, 1.0, red);
      // 年 at x≈291, 月 at x≈319, 日 at x≈347
      txt(281, 623, taW.year, 7);
      txt(310, 623, taW.month, 7);
      txt(338, 623, taW.day, 7);
    }

    // === BOTTOM CERTIFICATION SECTION ===
    // 令和 at x=337, y=684; 年 at x=384; 月 at x=417; 日 at x=450
    if (todayW) {
      txt(363, 692, todayW.year, 9);
      txt(400, 692, todayW.month, 9);
      txt(433, 692, todayW.day, 9);
    }

    // 事業所所在地 - aligned with label end (~x=280)
    txt(280, 711, '静岡県磐田市上本郷1006-7', 8);
    // 名称
    txt(280, 728, '有限会社ステップ・アップ', 8);
    // 代表者氏名
    txt(280, 744, '山下　浩俊', 8);
    // 電話 - white-out the existing （　）　－ template text first
    // Template has: （ at x=243, ） at x=304, ー at x=370, y=752-762
    page.drawRectangle({ x: 240, y: H - 764, width: 160, height: 16, color: PDFLib.rgb(1, 1, 1), borderWidth: 0 });
    txt(280, 760, '0538-36-6968', 8);

    // Remove page 2 if exists
    var pageCount = pdfDoc.getPageCount();
    if (pageCount > 1) {
      for (var pi = pageCount - 1; pi >= 1; pi--) {
        pdfDoc.removePage(pi);
      }
    }

    // === Generate PDF ===
    var pdfBytes = await pdfDoc.save();
    var blob = new Blob([pdfBytes], { type: 'application/pdf' });
    var url = URL.createObjectURL(blob);

    // Open in new window for preview
    var pw = window.open(url, '_blank');
    if (!pw) {
      // Fallback: create download link
      var a = document.createElement('a');
      a.href = url;
      a.download = '脱退連絡票_' + shimei + '.pdf';
      a.click();
    }

    // Also try Web Share API for mobile
    if (navigator.share && navigator.canShare) {
      var file = new File([pdfBytes], '脱退連絡票_' + shimei + '.pdf', { type: 'application/pdf' });
      if (navigator.canShare({ files: [file] })) {
        // Show share button
        setTimeout(function() {
          if (confirm('PDFを共有しますか？')) {
            navigator.share({ files: [file], title: '脱退連絡票 - ' + shimei });
          }
        }, 1000);
      }
    }

    showToast('脱退連絡票PDFを生成しました');
    closeDattaiForm();
  } catch(e) {
    console.error('脱退連絡票エラー:', e);
    showToast('エラー: ' + (e.message || e), 'error');
  }
}




async function openNyutaiEmployee(empId) {
  showSpinner();
  try {
    const token = await getToken();
    if (!token) { hideSpinner(); return; }
    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_EMPLOYEES_GUID + "')/items(" + empId + ")";
    const resp = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json;odata=verbose' }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    currentEmployee = data.d;
    // Use same flow as selectEmployee
    await loadLeaveDetails();
    switchScreen('detailScreen');
    switchTopTab('profile');
  } catch (e) {
    console.error('Open nyutai employee error:', e);
    showToast('社員情報の取得に失敗しました: ' + e.message, 'error');
  } finally {
    hideSpinner();
  }
}

async function openHakenList() {
  const select = document.getElementById('hakenSelect');
  const buka = select.value;
  if (!buka) {
    showToast('派遣先(部課)を選択してください', 'error');
    return;
  }
  const includeRetired = document.getElementById('hakenIncludeRetired').checked;
  showSpinner();
  try {
    const allEmps = await spGetAll(LIST_EMPLOYEES_GUID, '$top=500');
    let filtered = allEmps.filter(emp => getBukaValue(emp) === buka);
    if (!includeRetired) {
      filtered = filtered.filter(emp => !isResigned(emp));
    }
    hakenEmployeesCache = filtered;
    hakenCurrentFilter = 'all';
    await ensureHakenKeyMap();
    switchScreen('hakenListScreen');
    initHakenColumnSelector();
    renderHakenList(buka, filtered);
  } catch (e) {
    console.error('Haken list error:', e);
    showToast('読み込みエラー: ' + e.message, 'error');
  } finally {
    hideSpinner();
  }
}

function getTsukinValue(emp) {
  const key = Object.keys(emp).find(k => k.indexOf('x901a__x52e4__x65b9__x6cd5') >= 0);
  return key ? (emp[key] || '') : '';
}

function renderHakenList(hakensaki, employees) {
  const header = document.getElementById('hakenListHeader');
  const filterDiv = document.getElementById('hakenFilterBtns');
  const body = document.getElementById('hakenListBody');

  // Count by tsukin category
  let countSougei = 0, countOther = 0, countEmpty = 0;
  employees.forEach(emp => {
    const t = getTsukinValue(emp);
    if (!t) countEmpty++;
    else if (t.indexOf('送迎') >= 0) countSougei++;
    else countOther++;
  });

  header.innerHTML = '<div style="font-size:16px;font-weight:700;color:var(--primary);">' + escHtml(hakensaki) + '</div>' +
    '<div style="font-size:12px;color:var(--text-light);margin-top:2px;">社員数: ' + employees.length + '名</div>';

  filterDiv.innerHTML =
    '<button class="haken-filter-btn active" data-filter="all" onclick="applyHakenFilter(\'all\',this)">全員 (' + employees.length + ')</button>' +
    '<button class="haken-filter-btn" data-filter="sougei" onclick="applyHakenFilter(\'sougei\',this)">🚐 送迎 (' + countSougei + ')</button>' +
    '<button class="haken-filter-btn" data-filter="other" onclick="applyHakenFilter(\'other\',this)">🚗 送迎以外 (' + countOther + ')</button>' +
    '<button class="haken-filter-btn warn' + (countEmpty > 0 ? '' : '') + '" data-filter="empty" onclick="applyHakenFilter(\'empty\',this)">⚠ 未登録 (' + countEmpty + ')</button>' +
    '<button class="haken-dl-btn" onclick="downloadHakenExcel()" style="margin-left:auto;">📥 Excel</button>' +
    '<button class="refresh-btn" onclick="refreshHakenList()">&#x21bb; 更新</button>';

  renderHakenTable(employees, body);
}

function applyHakenFilter(filter, btn) {
  hakenCurrentFilter = filter;
  // Update active button
  document.querySelectorAll('#hakenFilterBtns .haken-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let filtered = hakenEmployeesCache;
  if (filter === 'sougei') {
    filtered = hakenEmployeesCache.filter(emp => getTsukinValue(emp).indexOf('送迎') >= 0);
  } else if (filter === 'other') {
    filtered = hakenEmployeesCache.filter(emp => { const t = getTsukinValue(emp); return t && t.indexOf('送迎') < 0; });
  } else if (filter === 'empty') {
    filtered = hakenEmployeesCache.filter(emp => !getTsukinValue(emp));
  }
  renderHakenTable(filtered, document.getElementById('hakenListBody'));
}

function toggleHakenColumns() {
  const sel = document.getElementById('hakenColSelector');
  const tog = document.getElementById('hakenColToggle');
  const open = sel.style.display === 'none';
  sel.style.display = open ? 'block' : 'none';
  tog.textContent = open ? '▲' : '▼';
}

function initHakenColumnSelector() {
  const container = document.getElementById('hakenColCheckboxes');
  // Filter out calc-only categories, show selectable ones
  const cats = PROFILE_CATEGORIES.filter(c => c.id !== 'emergency'); // skip rarely needed
  container.innerHTML = cats.map(cat => {
    const checked = hakenSelectedCols.includes(cat.id) ? 'checked' : '';
    return '<label style="display:flex;align-items:center;gap:4px;font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:8px;cursor:pointer;white-space:nowrap;background:' + (checked ? '#e8e8f5' : '#fff') + ';">' +
      '<input type="checkbox" value="' + cat.id + '" ' + checked + ' onchange="onHakenColChange(this)"> ' + cat.icon + ' ' + cat.label +
      '</label>';
  }).join('');
  updateHakenColCount();
}

function onHakenColChange(cb) {
  if (cb.checked) {
    if (!hakenSelectedCols.includes(cb.value)) hakenSelectedCols.push(cb.value);
  } else {
    hakenSelectedCols = hakenSelectedCols.filter(id => id !== cb.value);
  }
  // Update label style
  cb.parentElement.style.background = cb.checked ? '#e8e8f5' : '#fff';
  updateHakenColCount();
  // Re-render table with current filter
  const btn = document.querySelector('#hakenFilterBtns .haken-filter-btn.active');
  const filter = btn ? btn.dataset.filter : 'all';
  let data = hakenEmployeesCache;
  if (filter === 'sougei') data = data.filter(e => getTsukinValue(e).indexOf('送迎') >= 0);
  else if (filter === 'other') data = data.filter(e => { const t = getTsukinValue(e); return t && t.indexOf('送迎') < 0; });
  else if (filter === 'empty') data = data.filter(e => !getTsukinValue(e));
  renderHakenTable(data, document.getElementById('hakenListBody'));
}

function updateHakenColCount() {
  const el = document.getElementById('hakenColCount');
  el.textContent = hakenSelectedCols.length > 0 ? hakenSelectedCols.length + '項目選択中' : '';
}

async function ensureHakenKeyMap() {
  if (hakenKeyMap) return hakenKeyMap;
  const meta = await fetchEmployeeFields();
  if (meta) {
    hakenKeyMap = buildFieldKeyMap(meta);
  }
  return hakenKeyMap;
}

function getFieldValueForTable(emp, field, keyMap) {
  // Handle calc fields
  if (field.key === '_calcAge') {
    const bdKey = keyMap['birthday'];
    if (!bdKey || !emp[bdKey]) return '';
    const bd = new Date(emp[bdKey]);
    const now = new Date();
    let age = now.getFullYear() - bd.getFullYear();
    const m = now.getMonth() - bd.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < bd.getDate())) age--;
    return age + '歳';
  }
  if (field.key === '_calcTenure') return ''; // skip complex calc in table
  const odataKey = keyMap[field.key];
  if (!odataKey) return '';
  const val = emp[odataKey];
  if (val === null || val === undefined || val === '') return '';
  // Plain text for table (strip HTML)
  if (field.format === 'date' || field.format === 'dateExpiry') return formatDate(val);
  if (field.format === 'currency') {
    const num = parseFloat(val);
    return isNaN(num) ? String(val) : '¥' + Math.round(num).toLocaleString();
  }
  if (field.format === 'spUrl' && typeof val === 'object' && val.Url) return val.Description || val.Url;
  return String(val);
}

function renderHakenTable(employees, container) {
  if (employees.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>該当する社員がいません</p></div>';
    return;
  }

  // Build extra columns from selected categories
  const extraCols = [];
  if (hakenSelectedCols.length > 0 && hakenKeyMap) {
    hakenSelectedCols.forEach(catId => {
      const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      cat.fields.forEach(f => {
        if (f.key === '_calcTenure') return; // skip
        extraCols.push({ catId, field: f });
      });
    });
  }

  let html = '<table class="haken-table"><thead><tr>' +
    '<th>氏名</th><th>社番</th><th>通勤方法</th><th>在職</th>';
  extraCols.forEach(col => {
    html += '<th>' + escHtml(col.field.label) + '</th>';
  });
  html += '</tr></thead><tbody>';

  employees.forEach(emp => {
    const tsukin = getTsukinValue(emp);
    const resigned = isResigned(emp);
    const tsukinDisplay = tsukin ? escHtml(tsukin) : '<span style="color:var(--warning);font-weight:600;">⚠未登録</span>';
    const statusDisplay = resigned ? '<span style="color:var(--danger);">退社</span>' : '<span style="color:var(--success);">在職</span>';
    html += '<tr onclick=\'selectEmployee(' + JSON.stringify(emp).replace(/'/g, "&#39;") + ')\' style="cursor:pointer;">' +
      '<td style="font-weight:600;">' + escHtml(emp.Title || '') + '</td>' +
      '<td>' + (emp[F.syainNo] || '') + '</td>' +
      '<td>' + tsukinDisplay + '</td>' +
      '<td>' + statusDisplay + '</td>';
    extraCols.forEach(col => {
      html += '<td>' + escHtml(getFieldValueForTable(emp, col.field, hakenKeyMap)) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function refreshHakenList() {
  const select = document.getElementById('hakenSelect');
  const buka = select.value;
  if (!buka) return;
  const includeRetired = document.getElementById('hakenIncludeRetired').checked;
  showSpinner();
  try {
    const allEmps = await spGetAll(LIST_EMPLOYEES_GUID, '$top=500');
    let filtered = allEmps.filter(emp => getBukaValue(emp) === buka);
    if (!includeRetired) {
      filtered = filtered.filter(emp => !isResigned(emp));
    }
    hakenEmployeesCache = filtered;
    renderHakenList(buka, filtered);
    // Re-apply current filter
    if (hakenCurrentFilter !== 'all') {
      const btn = document.querySelector('#hakenFilterBtns .haken-filter-btn[data-filter="' + hakenCurrentFilter + '"]');
      if (btn) applyHakenFilter(hakenCurrentFilter, btn);
    }
    showToast('更新しました', 'success');
  } catch (e) {
    showToast('更新エラー: ' + e.message, 'error');
  } finally {
    hideSpinner();
  }
}

function downloadHakenExcel() {
  // Get currently displayed employees based on filter
  let data = hakenEmployeesCache;
  if (hakenCurrentFilter === 'sougei') {
    data = data.filter(emp => getTsukinValue(emp).indexOf('送迎') >= 0);
  } else if (hakenCurrentFilter === 'other') {
    data = data.filter(emp => { const t = getTsukinValue(emp); return t && t.indexOf('送迎') < 0; });
  } else if (hakenCurrentFilter === 'empty') {
    data = data.filter(emp => !getTsukinValue(emp));
  }

  const buka = document.getElementById('hakenSelect').value || '部課';

  // Build extra columns from selected categories
  const extraCols = [];
  if (hakenSelectedCols.length > 0 && hakenKeyMap) {
    hakenSelectedCols.forEach(catId => {
      const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
      if (!cat) return;
      cat.fields.forEach(f => {
        if (f.key === '_calcTenure') return;
        extraCols.push({ field: f });
      });
    });
  }

  // Build CSV with BOM for Excel Japanese support
  const BOM = '\uFEFF';
  const headers = ['氏名', '社員番号', '通勤方法', '在職状態', '部課'];
  extraCols.forEach(col => headers.push(col.field.label));
  const rows = data.map(emp => {
    const tsukin = getTsukinValue(emp);
    const status = isResigned(emp) ? '退社' : '在職';
    const base = [
      '"' + (emp.Title || '').replace(/"/g, '""') + '"',
      emp[F.syainNo] || '',
      '"' + tsukin.replace(/"/g, '""') + '"',
      status,
      '"' + buka.replace(/"/g, '""') + '"'
    ];
    extraCols.forEach(col => {
      const val = hakenKeyMap ? getFieldValueForTable(emp, col.field, hakenKeyMap) : '';
      base.push('"' + val.replace(/"/g, '""') + '"');
    });
    return base.join(',');
  });

  const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = buka + '_社員一覧.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('ダウンロードしました', 'success');
}
