async function confirmMaebari() {
  if (!maebariSelectedPayDate || !maebariSelectedAmount || !currentEmployee) return;

  const btn = document.getElementById('maebariSubmitBtn');
  btn.disabled = true;
  btn.textContent = '確認中...';

  try {
    // Duplicate check: same employee + same pay date
    const syainNo = currentEmployee[F.syainNo];
    const dateStart = new Date(maebariSelectedPayDate);
    dateStart.setHours(0,0,0,0);
    const dateEnd = new Date(maebariSelectedPayDate);
    dateEnd.setHours(23,59,59,999);
    const dupFilter = "$filter=" + MF.syainNo + " eq '" + syainNo + "' and " +
      MF.payDate + " ge datetime'" + dateStart.toISOString() + "' and " +
      MF.payDate + " le datetime'" + dateEnd.toISOString() + "'&$top=1&$select=Id";
    const dupRecords = await spGet(LIST_MAEBARI_GUID, dupFilter) || [];

    if (dupRecords.length > 0) {
      showToast('この前払日は既に申請済みです。重複申請はできません。', 'error');
      btn.disabled = false;
      btn.textContent = '前払い申請';
      return;
    }

    const info = getEmployeeBankInfo(currentEmployee);
    const dateStr = formatDateShort(maebariSelectedPayDate);
    const amountStr = formatCurrency(maebariSelectedAmount);

    let msg;
    if (info.hasBank) {
      msg = dateStr + ' に ' + amountStr + ' を申請します。\n\n'
        + '【振込先】\n'
        + '銀行: ' + info.bank + '\n'
        + '支店: ' + info.branch + '\n'
        + '口座: ' + info.account + '\n'
        + '名義: ' + (currentEmployee[F.meigi] || '未登録') + '\n\n'
        + 'この口座に振り込みます。よろしいですか？';
    } else {
      msg = dateStr + ' に ' + amountStr + ' を申請します。\n\n'
        + '⚠ 口座情報が登録されていません。\n'
        + '振込日までに口座情報を社員データに保存してください。\n\n'
        + 'このまま申請を続けますか？';
    }

    btn.disabled = false;
    btn.textContent = '前払い申請';

    if (confirm(msg)) {
      submitMaebari();
    }
  } catch (e) {
    console.error('Duplicate check error:', e);
    btn.disabled = false;
    btn.textContent = '前払い申請';
    showToast('確認中にエラーが発生しました', 'error');
  }
}

async function submitMaebari() {
  if (!maebariSelectedPayDate || !maebariSelectedAmount || !currentEmployee) return;

  const emp = currentEmployee;
  const btn = document.getElementById('maebariSubmitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const token = await getToken();
    if (!token) { showToast('認証エラー', 'error'); return; }

    const hakensaki = getHakensakiCode(emp);
    const bankInfo = getEmployeeBankInfo(emp);
    const body = {
      '__metadata': { 'type': LIST_MAEBARI_ENTITY },
      'Title': String(emp[F.syainNo] || ''),
      'NO_x002e_': String(emp[F.syainNo] || ''),
      'OData__x652f__x6255__x65e5_': maebariSelectedPayDate.toISOString(),
      'OData__x6d3e__x9063__x5148_': hakensaki,
      'OData__x540d__x3000__x3000__x3000__x52': emp.Title || '',
      'OData__x91d1__x984d_': maebariSelectedAmount.toLocaleString(),
      'OData__x9280__x884c_': bankInfo.bank,
      'OData__x652f__x5e97_': bankInfo.branch,
      'OData__x53e3__x5ea7_': bankInfo.account,
      'OData__x540d__x7fa9_': emp[F.meigi] || '',
      'zaisyoku': (emp[F.hakenTaisha] || emp[F.yukyuTaisha]) ? '退職' : '在職',
      'zaiyokusyubetu': emp[F.zaiyokuSyubetu] || '',
    };

    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_MAEBARI_GUID + "')/items";
    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json;odata=verbose',
        'Content-Type': 'application/json;odata=verbose',
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('Maebari submit error:', resp.status, errText);
      throw new Error('送信失敗: ' + resp.status);
    }

    showToast('前払い申請を送信しました', 'success');
    maebariSelectedPayDate = null;
    maebariSelectedAmount = null;
    loadMaebariData();
  } catch (e) {
    console.error('Maebari submit error:', e);
    showToast('前払い申請エラー: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '前払い申請';
  }
}

function getThisFriday() {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun..6=Sat
  const diff = (5 - dow + 7) % 7; // days until Friday
  const fri = new Date(today);
  fri.setDate(today.getDate() + diff);
  return fri;
}

const WEEKDAY_JP = ['日','月','火','水','木','金','土'];

function formatDateWithDay(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '/' + m + '/' + day + '（' + WEEKDAY_JP[d.getDay()] + '）';
}

      MF.payDate + " le datetime'" + de.toISOString() + "'" +
      "&$orderby=" + MF.hakensaki + " asc," + MF.syainNo +
      "&$top=500&$expand=Author&$select=Id,Created,Author/Title," + [MF.syainNo, MF.name, MF.hakensaki, MF.amount, MF.fee, MF.total, MF.payDate, MF.bank, MF.branch, MF.account, MF.meigi, 'zaiyokusyubetu', 'zaisyoku'].join(',');
    const records = await spGet(LIST_MAEBARI_GUID, filter) || [];
    window._maebariListRecords = records;

    countEl.textContent = records.length + '件';

    if (records.length === 0) {
      body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light);">この日の前払いデータはありません</div>';
      return;
    }

    let totalAmount = 0;
    let html = '<div class="maebari-scroll-wrap"><table class="list-table maebari-fit"><thead><tr><th>No.</th><th>派遣先</th><th>氏名</th><th>金額</th><th>登録者</th><th>登録日時</th></tr></thead><tbody>';
    records.forEach(r => {
      const amt = parseInt(String(r[MF.amount] || '0').replace(/,/g, '')) || 0;
      const fee = parseInt(String(r[MF.fee] || '0').replace(/,/g, '')) || 0;
      totalAmount += amt + fee;
      let haken = r[MF.hakensaki] || '';
      const hMatch = haken.match(/(\d+:[^\d].*)/);
      if (hMatch) haken = hMatch[1].replace(/\d+$/, '');
      const colonIdx = haken.indexOf(':');
      if (colonIdx >= 0) haken = haken.substring(colonIdx + 1);
      const author = r.Author ? r.Author.Title : '';
      const created = r.Created ? formatTimeShort(r.Created) : '';
      const feeHtml = fee ? '<span class="fee-sub">+' + fee.toLocaleString() + '</span>' : '';
      html += '<tr style="cursor:pointer;" onclick="openMaebariEdit(' + r.Id + ')">'
        + '<td>' + escHtml(String(r[MF.syainNo] || '')) + '</td>'
        + '<td>' + escHtml(haken) + '</td>'
        + '<td>' + escHtml(r[MF.name] || '') + '</td>'
        + '<td style="text-align:right;white-space:normal;line-height:1.3;">' + amt.toLocaleString() + feeHtml + '</td>'
        + '<td>' + escHtml(author) + '</td>'
        + '<td>' + created + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div><div style="height:50px;"></div>';
    body.innerHTML = html;

    footer.style.display = 'flex';
    footer.innerHTML = '<div class="footer-item"><span class="footer-label">申請件数</span> ' + records.length + '件</div>'
      + '<div class="footer-item"><span class="footer-label">合計金額</span> ' + totalAmount.toLocaleString() + '円</div>';
  } catch (e) {
    console.error('Maebari list error:', e);
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--danger);">データ取得エラー</div>';
  }
}

function formatTimeShort(isoStr) {
  const d = new Date(isoStr);
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

  const fee = record[MF.fee] || '';

  const branch = record[MF.branch] || '';

      <div class="edit-emp">${escHtml(syainNo)}　${escHtml(name)}</div>

          const sel = amount === a.toLocaleString() ? ' selected' : '';
          return '<option value="' + a.toLocaleString() + '"' + sel + '>' + a.toLocaleString() + '円</option>';

      <div id="editCustomAmountWrap" style="margin-top:6px;display:${![5000,10000,20000,30000,40000,50000,60000,70000,80000,90000,100000].includes(parseInt(String(amount).replace(/,/g,''))) && amount ? 'block' : 'none'};">
        <input type="text" id="editMaebariAmountCustom" placeholder="金額を入力（例: 15,000）" value="${![5000,10000,20000,30000,40000,50000,60000,70000,80000,90000,100000].includes(parseInt(String(amount).replace(/,/g,''))) && amount ? escHtml(amount) : ''}" ${isLocked ? 'disabled' : ''}>
      </div>

      <div class="edit-field-label">手数料</div>
      <select id="editMaebariFee" ${isLocked ? 'disabled' : ''}>

        <option value="275"${fee === '275' ? ' selected' : ''}>275</option>
        <option value="440"${fee === '440' ? ' selected' : ''}>440</option>

function onEditAmountChange() {
  const sel = document.getElementById('editMaebariAmount');
  const wrap = document.getElementById('editCustomAmountWrap');
  if (sel.value === '__custom__') {
    wrap.style.display = 'block';
    document.getElementById('editMaebariAmountCustom').focus();
  } else {
    wrap.style.display = 'none';
  }
}

function copyAccountNumber() {
  if (!editingMaebariRecord) return;
  const acc = editingMaebariRecord[MF.account] || '';
  const numMatch = acc.match(/[\d]+/);
  const num = numMatch ? numMatch[0] : acc;
  navigator.clipboard.writeText(num).then(() => {
    const btn = document.getElementById('copyAccBtn');
    btn.textContent = '✓'; btn.style.background = 'var(--success)';
    setTimeout(() => { btn.textContent = 'コピー'; btn.style.background = 'var(--primary)'; }, 1500);
  }).catch(() => showToast('コピーに失敗しました', 'error'));
}

async function saveMaebariEdit() {
  if (!editingMaebariRecord) return;
  const btn = document.getElementById('editMaebariSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const selAmount = document.getElementById('editMaebariAmount').value;
    const customAmount = document.getElementById('editMaebariAmountCustom').value.trim();
    const amount = selAmount === '__custom__' ? customAmount : selAmount;
    const fee = document.getElementById('editMaebariFee').value;

    if (!amount) { showToast('金額を入力してください', 'error'); btn.disabled = false; btn.textContent = '修正完了'; return; }

    const token = await getToken();
    if (!token) { showToast('認証エラー', 'error'); return; }

    const itemId = editingMaebariRecord.Id;
    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_MAEBARI_GUID + "')/items(" + itemId + ")";
    const body = {
      '__metadata': { 'type': LIST_MAEBARI_ENTITY },
    };
    body[MF.amount] = amount;
    if (fee) body[MF.fee] = fee;

    // 前払日の変更
    const editPayDateInput = document.getElementById('editPayDateInput');
    if (editPayDateInput && editPayDateInput.value) {
      body[MF.payDate] = editPayDateInput.value + 'T00:00:00Z';
    }

    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json;odata=verbose',
        'Content-Type': 'application/json;odata=verbose',
        'IF-MATCH': '*',
        'X-HTTP-Method': 'MERGE',
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('Update error:', errText);
      throw new Error('更新失敗: ' + resp.status);
    }

    showToast('修正しました', 'success');
    switchScreen('maebariListScreen');
    loadMaebariList();
  } catch (e) {
    console.error('Save error:', e);
    showToast('修正エラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '修正完了';
  }
}

async function deleteMaebariEdit() {
  if (!editingMaebariRecord) return;
  const name = editingMaebariRecord[MF.name] || '';
  const amount = editingMaebariRecord[MF.amount] || '';
  if (!confirm(name + ' の前払い ' + amount + '円 を削除しますか？\nこの操作は取り消せません。')) return;

  const btn = document.getElementById('editMaebariDeleteBtn');
  btn.disabled = true; btn.textContent = '削除中...';

    const itemId = editingMaebariRecord.Id;
    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_MAEBARI_GUID + "')/items(" + itemId + ")";

    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json;odata=verbose',
        'IF-MATCH': '*',
        'X-HTTP-Method': 'DELETE',
      },
    });

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('Delete error:', errText);
      throw new Error('削除失敗: ' + resp.status);
    }

    showToast('削除しました', 'success');
    editingMaebariRecord = null;
    switchScreen('maebariListScreen');
    loadMaebariList();

    console.error('Delete error:', e);
    showToast('削除エラー: ' + e.message, 'error');

}

async function loadYukyuList() {
  const fromVal = document.getElementById('yukyuListDateFrom').value;
  const toVal = document.getElementById('yukyuListDateTo').value;
  if (!fromVal || !toVal) return;
  const body = document.getElementById('yukyuListBody');
  const countEl = document.getElementById('yukyuListCount');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light);">読み込み中...</div>';

  try {
    const ds = new Date(fromVal); ds.setHours(0,0,0,0);
    const de = new Date(toVal); de.setHours(23,59,59,999);
    const filter = "$filter=" + F.leaveDate + " ge datetime'" + ds.toISOString() + "' and " +
      F.leaveDate + " le datetime'" + de.toISOString() + "'" +
      "&$orderby=Title asc," + F.leaveDate + " desc&$top=500" +
      "&$select=Id,Title," + [F.syainNo, F.shimei, F.leaveDate, F.leaveType, F.leaveTypeDetail, F.leaveHours, F.hourlyRate, F.amount, F.category].join(',');
    const records = await spGet(LIST_LEAVE_GUID, filter) || [];
    window._yukyuListRecords = records;

    countEl.textContent = records.length + '件';

    if (records.length === 0) {
      body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light);">この期間の有給データはありません</div>';
      return;
    }

    let html = '<table class="list-table yukyu-fit"><thead><tr><th>派遣先</th><th>社番</th><th>氏名</th><th>有給日</th><th>取得日数</th></tr></thead><tbody>';
    records.forEach(r => {
      let haken = r.Title || '';
      const hMatch = haken.match(/(\d+:[^\d].*)/);
      if (hMatch) haken = hMatch[1].replace(/\d+$/, '');
      const colonIdx = haken.indexOf(':');
      if (colonIdx >= 0) haken = haken.substring(colonIdx + 1);
      const leaveDate = r[F.leaveDate] ? formatDateShort(new Date(r[F.leaveDate])) : '';
      const dayTypeRaw = r[F.leaveTypeDetail] || r[F.leaveType] || '';
      const dayDisplay = dayTypeRaw.replace(/[()（）]/g, '').replace(/\s+/g, '').trim();
      const shimei = (r[F.shimei] || '').length > 10 ? (r[F.shimei] || '').substring(0, 10) + '..' : (r[F.shimei] || '');
      html += '<tr style="cursor:pointer;" onclick="openYukyuEdit(' + r.Id + ')">'
        + '<td>' + escHtml(haken) + '</td>'
        + '<td>' + (r[F.syainNo] || '') + '</td>'
        + '<td>' + escHtml(shimei) + '</td>'
        + '<td>' + leaveDate + '</td>'
        + '<td>' + escHtml(dayDisplay) + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  } catch (e) {
    console.error('Yukyu list error:', e);
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--danger);">データ取得エラー</div>';
  }
}

async function saveYukyuEdit() {
  if (!editingYukyuRecord) return;
  const btn = document.getElementById('editYukyuSaveBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const newDate = document.getElementById('yukyuEditDateInput').value;
    const dayTypeSelect = document.getElementById('yukyuEditDayType').value;

    if (!newDate) { showToast('日付を入力してください', 'error'); btn.disabled = false; btn.textContent = '修正完了'; return; }

    // Map select value to SharePoint field values
    let leaveType = '1日(定時)';
    let leaveTypeDetail = '';
    if (dayTypeSelect === '0.5日AM') { leaveType = '半日（午前）'; leaveTypeDetail = '午前'; }
    else if (dayTypeSelect === '0.5日PM') { leaveType = '半日（午後）'; leaveTypeDetail = '午後'; }

    const token = await getToken();
    if (!token) { showToast('認証エラー', 'error'); return; }

    const itemId = editingYukyuRecord.Id;
    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_LEAVE_GUID + "')/items(" + itemId + ")";
    const body = {
      '__metadata': { 'type': LIST_ITEM_ENTITY },
    };
    body[F.leaveDate] = newDate + 'T00:00:00Z';
    body[F.leaveType] = leaveType;
    body[F.leaveTypeDetail] = leaveTypeDetail;

    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json;odata=verbose',
        'Content-Type': 'application/json;odata=verbose',
        'IF-MATCH': '*',
        'X-HTTP-Method': 'MERGE',
      },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('Yukyu update error:', errText);
      throw new Error('更新失敗: ' + resp.status);
    }

    showToast('修正しました', 'success');
    switchScreen('yukyuListScreen');
    loadYukyuList();
  } catch (e) {
    console.error('Yukyu save error:', e);
    showToast('修正エラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '修正完了';
  }
}

function openApplyScreen() {
  selectedDates = [];
  calendarYear = new Date().getFullYear();
  calendarMonth = new Date().getMonth();
  renderApplyScreen();
  switchScreen('applyScreen');
}

    document.getElementById('applyContent').innerHTML = '<div class="empty-state"><p>社員を選択してください</p></div>';
    return;
  }

  const activeGrants = (currentGrantData || []).filter(g => !g.expired);

  activeGrants.forEach(g => totalRemain += g.remainingDays);

  const fullDayHours = emp[F.fullDayHours] || 8;
  const amHours = emp[F.amHours] || 4;
  const pmHours = emp[F.pmHours] || 4;

  const hakensaki = getHakensaki(emp);

  document.getElementById('applyContent').innerHTML = `
    <div class="detail-header">
      <div class="name">${escHtml(emp.Title || '')}</div>
      <div class="sub">${hakensaki ? '派遣先: ' + escHtml(hakensaki) + ' | ' : ''}残日数: ${totalRemain}日</div>
    </div>

    <div class="warning-msg" id="balanceWarning">残日数が不足しています。申請できません。</div>

    <div class="card">
      <div class="section-title">取得日を選択</div>
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">&lsaquo;</button>
        <span class="month-label" id="calMonthLabel"></span>
        <button onclick="changeMonth(1)">&rsaquo;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>

      <div class="section-title">選択中の日付</div>
      <div class="selected-dates-list" id="selectedDatesList">
        <span style="color:var(--text-light);font-size:13px;">日付をタップして選択</span>
      </div>
    </div>

    <div class="card">
      <div class="section-title">取得区分</div>
      <div class="type-selector" id="leaveTypeSelector" style="grid-template-columns: 1fr 1fr 1fr;">
        <div class="type-option active" data-type="1日（定時）" onclick="selectLeaveType(this)"><span style="font-size:16px;">1日</span><br><span style="font-size:11px;color:var(--text-light);">（定時）</span></div>
        <div class="type-option" data-type="半日（午前）" onclick="selectLeaveType(this)">AM<br>有給</div>
        <div class="type-option" data-type="半日（午後）" onclick="selectLeaveType(this)">PM<br>有給</div>
      </div>

      <div class="form-group">
        <label class="form-label">申請区分</label>
        <select class="form-select" id="applyCategory">
          <option value="普通申請ふつうしんせい">普通申請</option>
          <option value="特別申請とくべつしんせい">特別申請</option>
        </select>
      </div>
    </div>

    <div class="calc-summary" id="calcSummary">
      <div class="calc-row"><span class="label">選択日数</span><span class="value" id="calcDays">0日</span></div>
      <div class="calc-row"><span class="label">取得区分</span><span class="value" id="calcType">1日（定時）</span></div>
      <div class="calc-row"><span class="label">時給</span><span class="value" id="calcHourly">-</span></div>
      <div class="calc-row"><span class="label">金額</span><span class="value" id="calcAmount">-</span></div>
      <div class="calc-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;">
        <span class="label">申請後残日数</span><span class="value" id="calcRemain">${totalRemain}日</span>
      </div>
    </div>

    <button class="btn btn-success btn-block btn-lg" id="submitBtn" onclick="submitLeaveApplication()" ${totalRemain <= 0 ? 'disabled' : ''}>
      申請する
    </button>
  `;

  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const label = document.getElementById('calMonthLabel');
  if (!grid || !label) return;

  label.textContent = calendarYear + '年' + (calendarMonth + 1) + '月';

  const headers = ['日', '月', '火', '水', '木', '金', '土'];
  let html = headers.map(h => '<div class="day-header">' + h + '</div>').join('');

  const firstDay = new Date(calendarYear, calendarMonth, 1);
  const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
  const startDow = firstDay.getDay();

  // Get applied dates as Set for quick lookup
  const appliedSet = new Set();
  appliedDatesCache.forEach(r => {
    const d = new Date(r[F.leaveDate]);
    appliedSet.add(formatDateISO(d));
  });

  const today = new Date();
  const todayStr = formatDateISO(today);

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) {
    html += '<div class="calendar-cell"></div>';
  }

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(calendarYear, calendarMonth, day);
    const dateStr = formatDateISO(date);
    const dow = date.getDay();

    const classes = ['calendar-cell'];
    if (dow === 0) classes.push('sunday');
    if (dow === 6) classes.push('saturday');
    if (dow === 0 || dow === 6) classes.push('weekend');
    if (dateStr === todayStr) classes.push('today');

    const isApplied = appliedSet.has(dateStr);
    if (isApplied) classes.push('applied');

    const isSelected = selectedDates.includes(dateStr);
    if (isSelected) classes.push('selected');

    const onclick = isApplied ? '' : `onclick="toggleDate('${dateStr}')"`;

    html += `<div class="${classes.join(' ')}" ${onclick}>${day}</div>`;
  }

  grid.innerHTML = html;
}

function changeMonth(delta) {
  calendarMonth += delta;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderCalendar();
}

function toggleDate(dateStr) {
  const idx = selectedDates.indexOf(dateStr);
  if (idx >= 0) {
    selectedDates.splice(idx, 1);
  } else {
    selectedDates.push(dateStr);
  }
  selectedDates.sort();
  renderCalendar();
  renderSelectedDates();
  updateCalcSummary();
}

function removeDate(dateStr) {
  selectedDates = selectedDates.filter(d => d !== dateStr);
  renderCalendar();
  renderSelectedDates();
  updateCalcSummary();
}

function renderSelectedDates() {
  const container = document.getElementById('selectedDatesList');
  if (!container) return;
  if (selectedDates.length === 0) {
    container.innerHTML = '<span style="color:var(--text-light);font-size:13px;">日付をタップして選択</span>';
    return;
  }
  container.innerHTML = selectedDates.map(d => {
    const parts = d.split('-');
    return `<div class="date-chip">${parseInt(parts[1])}/${parseInt(parts[2])}<span class="remove" onclick="removeDate('${d}')">&times;</span></div>`;
  }).join('');
}

function selectLeaveType(el) {
  document.querySelectorAll('#leaveTypeSelector .type-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
  updateCalcSummary();
}

function getSelectedLeaveType() {
  const active = document.querySelector('#leaveTypeSelector .type-option.active');
  return active ? active.dataset.type : '1日（定時）';
}

function updateCalcSummary() {
  const leaveType = getSelectedLeaveType();
  const emp = currentEmployee;
  if (!emp) return;

  const fullDayHours = emp[F.fullDayHours] || 8;
  const amHours = emp[F.amHours] || 4;
  const pmHours = emp[F.pmHours] || 4;

  let daysPerDate = 1;
  let hoursPerDate = fullDayHours;

  if (leaveType === '半日（午前）') {
    daysPerDate = 0.5;
    hoursPerDate = amHours;
  } else if (leaveType === '半日（午後）') {
    daysPerDate = 0.5;
    hoursPerDate = pmHours;
  }

  const totalDays = selectedDates.length * daysPerDate;
  const totalHours = selectedDates.length * hoursPerDate;

  // Get hourly rate from leave records or use 0
  let hourlyRate = 0;
  if (appliedDatesCache.length > 0) {
    for (const r of appliedDatesCache) {
      if (r[F.hourlyRate] && r[F.hourlyRate] > 0) {
        hourlyRate = r[F.hourlyRate];
        break;
      }
    }
  }

  const totalAmount = Math.round(hourlyRate * totalHours);

  // Remaining balance
  const activeGrants = (currentGrantData || []).filter(g => !g.expired);
  let totalRemain = 0;
  activeGrants.forEach(g => totalRemain += g.remainingDays);
  const afterRemain = totalRemain - totalDays;

  document.getElementById('calcDays').textContent = totalDays + '日';
  document.getElementById('calcType').textContent = leaveType;
  document.getElementById('calcHourly').textContent = hourlyRate > 0 ? hourlyRate.toLocaleString() + '円' : '-';
  document.getElementById('calcAmount').textContent = totalAmount > 0 ? totalAmount.toLocaleString() + '円' : '-';
  document.getElementById('calcRemain').textContent = afterRemain + '日';

  // Warning
  const warning = document.getElementById('balanceWarning');
  const submitBtn = document.getElementById('submitBtn');
  if (afterRemain < 0) {
    warning.classList.add('show');
    submitBtn.disabled = true;
  } else {
    warning.classList.remove('show');
    submitBtn.disabled = selectedDates.length === 0;
  }
}

// ============================================================
// Submit Leave Application
// ============================================================
async function submitLeaveApplication() {
  const emp = currentEmployee;
  if (!emp || selectedDates.length === 0) {
    showToast('日付を選択してください', 'error');
    return;
  }

  const leaveType = getSelectedLeaveType();
  const fullDayHours = emp[F.fullDayHours] || 8;
  const amHours = emp[F.amHours] || 4;
  const pmHours = emp[F.pmHours] || 4;

  let hoursPerDate = fullDayHours;
  if (leaveType === '半日（午前）') hoursPerDate = amHours;
  else if (leaveType === '半日（午後）') hoursPerDate = pmHours;

  let hourlyRate = 0;
  if (appliedDatesCache.length > 0) {
    for (const r of appliedDatesCache) {
      if (r[F.hourlyRate] && r[F.hourlyRate] > 0) {
        hourlyRate = r[F.hourlyRate];
        break;
      }
    }
  }

  const category = document.getElementById('applyCategory').value;

  // Duplicate check
  const appliedSet = new Set();
  appliedDatesCache.forEach(r => {
    const d = new Date(r[F.leaveDate]);
    appliedSet.add(formatDateISO(d));
  });

  const duplicates = selectedDates.filter(d => appliedSet.has(d));
  if (duplicates.length > 0) {
    showToast('既に申請済みの日付があります: ' + duplicates.join(', '), 'error');
    return;
  }

  // Balance check
  const activeGrants = (currentGrantData || []).filter(g => !g.expired);
  let totalRemain = 0;
  activeGrants.forEach(g => totalRemain += g.remainingDays);
  let daysPerDate = 1;
  if (leaveType.indexOf('半日') >= 0) daysPerDate = 0.5;
  const totalDaysNeeded = selectedDates.length * daysPerDate;

  if (totalDaysNeeded > totalRemain) {
    showToast('残日数が不足しています', 'error');
    return;
  }

  showSpinner();
  let successCount = 0;
  let errorCount = 0;

  for (const dateStr of selectedDates) {
    try {
      const amount = Math.round(hourlyRate * hoursPerDate);
      const body = {
        __metadata: { type: LIST_ITEM_ENTITY },
        [F.syainNo]: emp[F.syainNo],
        Title: emp.Title || '',
        [F.shimei]: emp.Title || '',
        [F.leaveDate]: dateStr + 'T00:00:00Z',
        [F.leaveType]: leaveType,
        [F.hourlyRate]: hourlyRate,
        [F.amount]: amount,
        [F.category]: category,
      };

      await spPost(LIST_LEAVE_GUID, body);
      successCount++;
    } catch (e) {
      console.error('Submit error for ' + dateStr, e);
      errorCount++;
    }
  }

  hideSpinner();

  if (errorCount === 0) {
    showToast(successCount + '件の申請が完了しました', 'success');
    selectedDates = [];
    // Reload details
    showSpinner();
    try {
      await loadLeaveDetails();
    } catch (e) { /* ignore */ }
    hideSpinner();
    switchScreen('detailScreen');
  } else {
    showToast(successCount + '件成功、' + errorCount + '件失敗', 'error');
  }
}

// ============================================================
// Utility Functions
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '-';
  return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
}

function formatDateShort(date) {
  if (!date) return '-';
  return date.getFullYear() + '/' + String(date.getMonth() + 1).padStart(2, '0') + '/' + String(date.getDate()).padStart(2, '0');
}

function formatDateISO(date) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getHakensakiCode(emp) {
  const val = emp[F.hakensaki];
  if (!val) return '';
  const match = val.match(/(\d+:[^\d].+)/);
  if (!match) return '';
  return match[1].replace(/\d+$/, '');
}

function getHakensaki(emp) {
  const code = getHakensakiCode(emp);
  if (!code) return '';
  const colonIdx = code.indexOf(':');
  if (colonIdx < 0) return code;
  return code.substring(colonIdx + 1);
}

function getRetireDateStr(emp) {
  const d = emp[F.yukyuTaisha] || emp[F.hakenTaisha];
  if (!d) return '';
  return formatDate(d);
}

async function spDelete(itemId) {
  const token = await getToken();
  if (!token) { showToast('認証エラー: 再ログインしてください', 'error'); return null; }
  const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_LEAVE_GUID + "')/items(" + itemId + ")";
  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/json;odata=verbose',
      'IF-MATCH': '*',
      'X-HTTP-Method': 'DELETE'
    }
  });
  if (!resp.ok) {
    const errText = await resp.text();
    console.error('SP DELETE Error:', errText);
    throw new Error('SP DELETE Error: ' + resp.status);
  }
  return true;
}

function copyDetailToClipboard() {
  const emp = currentEmployee;
  if (!emp || !currentGrantData) return;

  const hakensaki = getHakensaki(emp);
  const kisanDate = emp[F.kisanDate] || emp[F.nyushaDate];
  const grants = currentGrantData;
  const latestG = grants[grants.length - 1];
  const dispRemain = latestG ? latestG._displayRemain : 0;
  const dispCarry = latestG ? latestG._displayCarryover : 0;
  const dispGranted = latestG ? latestG.grantedDays : 0;

  let text = '【有給休暇明細】\n';
  text += '氏名: ' + (emp.Title || '') + (hakensaki ? '（' + hakensaki + '）' : '') + '\n';
  text += '社員番号: ' + (emp[F.syainNo] || '') + '\n';
  text += '起算日: ' + formatDate(kisanDate) + '\n';
  text += '現在: 繰越 ' + dispCarry + '日 + 今期付与 ' + dispGranted + '日 → 合計残 ' + dispRemain + '日\n';
  text += '─────────────────\n';

  const records = appliedDatesCache || [];

  grants.slice().reverse().forEach((g, idx) => {
    const origIdx = grants.indexOf(g);
    const grantNum = origIdx + 1;
    const nextGrant = grants[origIdx + 1];
    let periodEnd;
    if (nextGrant) {
      periodEnd = new Date(nextGrant.grantDate.getTime() - 86400000);
    } else {
      const nd = new Date(g.grantDate);
      nd.setMonth(nd.getMonth() + 12);
      periodEnd = new Date(nd.getTime() - 86400000);
    }

    const periodEndFilter = nextGrant ? nextGrant.grantDate : new Date(9999,0,1);
    const grantRecords = records.filter(r => {
      const d = new Date(r[F.leaveDate]);
      return d >= g.grantDate && d < periodEndFilter;
    }).sort((a,b) => new Date(a[F.leaveDate]) - new Date(b[F.leaveDate]));
    let periodUsed = 0;
    grantRecords.forEach(r => { periodUsed += getRecordDays(r); });

    const dCarry = g._displayCarryover || 0;
    const dExpired = g._displayExpired || 0;
    const dRemain = g._displayRemain || 0;

    text += '\n■ 付与' + grantNum + '回目' + (g.isCurrentPeriod ? '（現在の付与）' : '') + '（' + formatDateShort(g.grantDate) + ' ～ ' + formatDateShort(periodEnd) + '）\n';
    text += '  消滅 ' + dExpired + '日 / 繰越 ' + dCarry + '日 / 付与 ' + g.grantedDays + '日 / 使用 ' + periodUsed + '日 / 残 ' + dRemain + '日';
    text += '  [' + (g.expired ? '消滅済' : '有効') + ']\n';

    if (g._expiredDetails && g._expiredDetails.length > 0) {
      g._expiredDetails.forEach(function(ed) {
        text += '  ※ ' + formatDateShort(ed.date) + ' に付与' + ed.grantNum + '回目の未使用 ' + ed.days + '日が時効消滅\n';
      });
    }

    if (grantRecords.length > 0) {
      text += '  取得履歴:\n';
      grantRecords.forEach(r => {
        const typeStr = getRecordTypeLabel(r);
        const dayCount = getRecordDays(r);
        text += '    ' + formatDate(r[F.leaveDate]) + '  ' + typeStr + '（' + dayCount + '日）\n';
      });
    }
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('クリップボードにコピーしました', 'success');
  }).catch(() => {
    // Fallback for mobile
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('コピーしました', 'success');
  });
}

async function deleteLeaveRecord(itemId, dateStr) {
  // Block deletion of records older than 2 months
  const twoMonthsAgo = new Date();
  twoMonthsAgo.setMonth(twoMonthsAgo.getMonth() - 2);
  const parts = dateStr.split('/');
  if (parts.length === 3) {
    const recordDate = new Date(parts[0], parts[1] - 1, parts[2]);
    if (recordDate < twoMonthsAgo) {
      showToast('2ヶ月以上前の記録は削除できません', 'error');
      return;
    }
  }
  if (!confirm('この有給取得記録を削除しますか？\n取得日: ' + dateStr)) return;
  showSpinner();
  try {
    await spDelete(itemId);
    showToast('削除しました', 'success');
    await loadLeaveDetails();
  } catch (e) {
    console.error('Delete error:', e);
    showToast('削除に失敗しました: ' + e.message, 'error');
  } finally {
    hideSpinner();
  }
}

let editKeyMap = null; // cached keyMap for edit operations

function getEditInputHtml(field, currentVal, fieldType, choices) {
  const id = 'editField_' + field.key;
  const val = (currentVal === null || currentVal === undefined) ? '' : currentVal;

  // Skip computed fields
  if (field.key.startsWith('_calc')) return '';
  // Skip spUrl (complex)
  if (field.format === 'spUrl') return '';

  // 派遣先 → 部課ドロップダウン
  if (field.key === 'hakensaki') {
    const bukaVal = getBukaValue(currentEmployee || {});
    const opts = document.getElementById('hakenSelect');
    let html = '<select class="edit-select" id="' + id + '" data-field="hakensaki" data-buka="1">';
    html += '<option value="">（未選択）</option>';
    if (opts) {
      Array.from(opts.options).forEach(o => {
        if (!o.value) return;
        const selected = (bukaVal === o.value) ? ' selected' : '';
        html += '<option value="' + escHtml(o.value) + '"' + selected + '>' + escHtml(o.value) + '</option>';
      });
    }
    html += '</select>';
    return html;
  }

  if (field.format === 'date' || field.format === 'dateExpiry') {
    let dateVal = '';
    if (val) {
      const d = new Date(val);
      if (!isNaN(d)) dateVal = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    return '<input type="date" class="edit-input" id="' + id + '" value="' + dateVal + '" data-field="' + field.key + '" data-format="date">';
  }
  if (field.format === 'currency') {
    const num = val ? parseFloat(String(val).replace(/,/g,'')) : '';
    return '<input type="number" class="edit-input" id="' + id + '" value="' + (isNaN(num) ? '' : num) + '" data-field="' + field.key + '" data-format="currency">';
  }
  if (field.format === 'tel') {
    return '<input type="tel" class="edit-input" id="' + id + '" value="' + escHtml(String(val)) + '" data-field="' + field.key + '">';
  }
  if (field.format === 'email') {
    return '<input type="email" class="edit-input" id="' + id + '" value="' + escHtml(String(val)) + '" data-field="' + field.key + '">';
  }
  // Choice field with choices → dropdown select
  if ((fieldType === 'Choice' || field.format === 'badge') && choices && choices.length > 0) {
    let html = '<select class="edit-select" id="' + id + '" data-field="' + field.key + '">';
    html += '<option value="">（未選択）</option>';
    choices.forEach(c => {
      const selected = (String(val) === c) ? ' selected' : '';
      html += '<option value="' + escHtml(c) + '"' + selected + '>' + escHtml(c) + '</option>';
    });
    html += '</select>';
    return html;
  }
  if (fieldType === 'Number' || fieldType === 'Currency') {
    const num = val ? parseFloat(String(val).replace(/,/g,'')) : '';
    return '<input type="number" step="any" class="edit-input" id="' + id + '" value="' + (isNaN(num) ? '' : num) + '" data-field="' + field.key + '" data-format="number">';
  }
  // Default: text
  return '<input type="text" class="edit-input" id="' + id + '" value="' + escHtml(String(val)) + '" data-field="' + field.key + '">';
}

async function startEditSection(catId) {
  const emp = currentEmployee;
  if (!emp) return;
  const meta = await fetchEmployeeFields();
  if (!meta) { showToast('フィールド情報の取得に失敗', 'error'); return; }
  editKeyMap = buildFieldKeyMap(meta);

  const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
  if (!cat) return;

  const viewDiv = document.getElementById('view_' + catId);
  const editDiv = document.getElementById('edit_' + catId);
  const accSection = document.getElementById('acc_' + catId);

  // Ensure accordion is open
  if (!accSection.classList.contains('open')) accSection.classList.add('open');

  let html = '<table class="acc-table">';
  cat.fields.forEach(field => {
    if (field.key.startsWith('_calc') || field.format === 'spUrl') {
      // Show computed/readonly fields as-is
      return;
    }
    const odataKey = editKeyMap[field.key];
    if (!odataKey) return;
    const val = emp[odataKey];
    const fieldType = getFieldType(field.key, editKeyMap);
    const choices = getFieldChoices(field.key, editKeyMap);
    const inputHtml = getEditInputHtml(field, val, fieldType, choices);
    if (!inputHtml) return;
    html += '<tr><th>' + escHtml(field.label) + '</th><td>' + inputHtml + '</td></tr>';
  });
  html += '</table>';
  html += '<div class="edit-actions">';
  html += '<button class="cancel-btn" onclick="cancelEditSection(\'' + catId + '\')">キャンセル</button>';

async function saveEditSection(catId) {
  const emp = currentEmployee;
  if (!emp || !emp.Id) { showToast('社員データが見つかりません', 'error'); return; }

  const btn = document.getElementById('saveBtn_' + catId);
  btn.disabled = true; btn.textContent = '保存中...';

  try {
    const cat = PROFILE_CATEGORIES.find(c => c.id === catId);
    if (!cat) throw new Error('カテゴリが見つかりません');

    const body = {};
    let hasChanges = false;

    cat.fields.forEach(field => {
      if (field.key.startsWith('_calc') || field.format === 'spUrl') return;

      const inputEl = document.getElementById('editField_' + field.key);
      if (!inputEl) return;

      // 派遣先 → 部課フィールドに書き込み
      let odataKey, internalName;
      if (inputEl.dataset.buka === '1') {
        odataKey = bukaODataKey;
        internalName = odataKeyToInternal(bukaODataKey);
      } else {
        odataKey = editKeyMap[field.key];
        internalName = odataKey ? odataKeyToInternal(odataKey) : null;
      }
      if (!odataKey || !internalName) return;

      const oldVal = emp[odataKey];
      let newVal = inputEl.value.trim();

      // Convert based on format
      if (inputEl.dataset.format === 'date' && newVal) {
        newVal = newVal + 'T00:00:00Z';
      } else if (inputEl.dataset.format === 'date' && !newVal) {
        newVal = null;
      } else if (inputEl.dataset.format === 'number' || inputEl.dataset.format === 'currency') {
        newVal = newVal ? parseFloat(newVal) : null;
      } else if (newVal === '') {
        newVal = null;
      }

      // Check if value changed
      let changed = false;
      if (inputEl.dataset.format === 'date') {
        const oldDate = oldVal ? new Date(oldVal).toISOString().substring(0,10) : '';
        const newDate = newVal ? newVal.substring(0,10) : '';
        changed = oldDate !== newDate;
      } else if (inputEl.dataset.format === 'number' || inputEl.dataset.format === 'currency') {
        const oldNum = oldVal ? parseFloat(String(oldVal).replace(/,/g,'')) : null;
        changed = oldNum !== newVal;
      } else {
        changed = (oldVal || '') !== (newVal || '');
      }

      if (changed) {
        body[internalName] = newVal;
        hasChanges = true;
      }
    });

    if (!hasChanges) {
      showToast('変更がありません', 'error');
      btn.disabled = false; btn.textContent = '📝 変更保存';
      return;
    }

    console.log('Saving to SP, itemId:', emp.Id, 'body:', JSON.stringify(body));
    await spPatchEmployee(emp.Id, body);

    // Reload employee data
    const updated = await fetchFullEmployee(emp[F.syainNo]);
    if (updated) {
      currentEmployee = updated;
    }

    showToast('保存しました', 'success');
    // Re-render profile
    await loadEmployeeProfile();

  } catch (e) {
    console.error('Save error:', e);
    showToast('保存エラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '📝 変更保存';
  }
}

async function deleteEmployee() {

// { docId: [ {file, dataUrl}, {file, dataUrl}, ... ] }
const capturedDocs = {};

function onDocCapture(docId, input) {
  const file = input.files[0];
  if (!file) return;
  if (!capturedDocs[docId]) capturedDocs[docId] = [];

  const reader = new FileReader();
  reader.onload = function(e) {
    const idx = capturedDocs[docId].length;
    capturedDocs[docId].push({ file: file, dataUrl: e.target.result });
    renderDocPreview(docId);
  };
  reader.readAsDataURL(file);
  // Reset input so same file can be re-selected
  input.value = '';
}

function renderDocPreview(docId) {
  const imgs = capturedDocs[docId] || [];
  const card = document.getElementById('docCard_' + docId);
  const preview = document.getElementById('docPreview_' + docId);
  const countEl = document.getElementById('docCount_' + docId);

  if (imgs.length === 0) {
    card.classList.remove('has-image');
    preview.style.display = 'none';
    preview.innerHTML = '';
    countEl.textContent = '';
    return;
  }

  card.classList.add('has-image');
  countEl.textContent = imgs.length + '枚';
  preview.style.display = 'block';

  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap;">';
  imgs.forEach((img, i) => {
    html += '<div style="position:relative;width:calc(50% - 3px);">';
    html += '<img src="' + img.dataUrl + '" style="width:100%;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.1);">';
    html += '<div style="position:absolute;top:4px;left:4px;background:var(--primary);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;">' + (i + 1) + '</div>';
    html += '<button onclick="removeDocPage(\'' + docId + '\',' + i + ')" style="position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;line-height:1;">&times;</button>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="display:flex;gap:6px;margin-top:6px;">';
  imgs.forEach((img, i) => {
    html += '<button class="doc-ocr-btn" onclick="runOcr(\'' + docId + '\',' + i + ')">🔍 ' + (i + 1) + '枚目</button>';
  });
  html += '</div>';
  html += '<div id="docOcrResult_' + docId + '"></div>';
  preview.innerHTML = html;
}

function removeDocPage(docId, idx) {
  if (!capturedDocs[docId]) return;
  capturedDocs[docId].splice(idx, 1);
  if (capturedDocs[docId].length === 0) delete capturedDocs[docId];
  renderDocPreview(docId);
}

function removeDocCapture(docId) {
  delete capturedDocs[docId];
  renderDocPreview(docId);
}

async function runOcr(docId, idx) {
  const imgs = capturedDocs[docId];
  if (!imgs || !imgs[idx]) return;
  const resultDiv = document.getElementById('docOcrResult_' + docId);
  resultDiv.innerHTML = '<div class="doc-ocr-progress">⏳ ' + (idx + 1) + '枚目テキスト抽出中...</div>';

  try {
    const worker = await Tesseract.createWorker('jpn+eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round((m.progress || 0) * 100);
          resultDiv.innerHTML = '<div class="doc-ocr-progress">⏳ 認識中... ' + pct + '%</div>';
        }
      }
    });
    const { data } = await worker.recognize(imgs[idx].dataUrl);
    await worker.terminate();

    if (data.text && data.text.trim()) {
      resultDiv.innerHTML = '<div style="font-size:11px;color:var(--text-light);margin-bottom:2px;">' + (idx + 1) + '枚目の抽出結果:</div>' +
        '<div class="doc-ocr-text">' + escHtml(data.text.trim()) + '</div>' +
        '<button class="doc-ocr-btn" style="margin-top:4px;" onclick="copyOcrText(\'' + docId + '\')">📋 コピー</button>';
    } else {
      resultDiv.innerHTML = '<div class="doc-ocr-progress">テキストを検出できませんでした</div>';
    }
  } catch (e) {
    console.error('OCR error:', e);
    resultDiv.innerHTML = '<div class="doc-ocr-progress" style="color:var(--danger);">OCRエラー: ' + escHtml(e.message) + '</div>';
  }
}

function copyOcrText(docId) {
  const textEl = document.querySelector('#docOcrResult_' + docId + ' .doc-ocr-text');
  if (!textEl) return;
  navigator.clipboard.writeText(textEl.textContent).then(() => {
    showToast('テキストをコピーしました', 'success');
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents(textEl);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    showToast('テキストを選択しました（Ctrl+Cでコピー）', 'success');
  });
}

// SharePoint Document Library Upload
const SP_DOC_SITE_URL = 'https://teamstepupcom774.sharepoint.com/sites/TeamStepup';
const SP_DOC_LIB_PATH = '/sites/TeamStepup/Shared Documents/社員ファイル';

async function ensureSpFolder(folderPath) {
  const token = await getToken();
  if (!token) throw new Error('認証エラー');
  // Try to create folder (will silently succeed if exists)
  const url = SP_DOC_SITE_URL + "/_api/web/folders";
  try {
    await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/json;odata=verbose',
        'Content-Type': 'application/json;odata=verbose',
      },
      body: JSON.stringify({
        '__metadata': { type: 'SP.Folder' },
        'ServerRelativeUrl': folderPath
      }),
    });
  } catch (e) {
    console.log('Folder may already exist:', folderPath);
  }
}

async function uploadFileToSp(folderPath, fileName, file) {
  const token = await getToken();
  if (!token) throw new Error('認証エラー');
  const arrayBuffer = await file.arrayBuffer();
  const encodedFolder = encodeURIComponent(folderPath).replace(/%2F/g, '/');
  const encodedName = encodeURIComponent(fileName);
  const url = SP_DOC_SITE_URL + "/_api/web/GetFolderByServerRelativeUrl('" + encodedFolder + "')/files/add(url='" + encodedName + "',overwrite=true)";
  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/json;odata=verbose',
    },
    body: arrayBuffer,
  });
  if (!resp.ok) {
    const errText = await resp.text();
    console.error('Upload error:', errText);
    throw new Error('アップロード失敗: ' + resp.status);
  }
  return await resp.json();
}

async function uploadCapturedDocs(bukaVal, syainNo, name) {
  const docIds = Object.keys(capturedDocs);
  if (docIds.length === 0) return;

  try {
    // Create folder: 社員ファイル/部課/社員番号 氏名
    const bukaFolder = SP_DOC_LIB_PATH + '/' + bukaVal;
    const empFolder = bukaFolder + '/' + syainNo + ' ' + name;

    await ensureSpFolder(bukaFolder);
    await ensureSpFolder(empFolder);

    // Upload each document (array of pages per doc type)
    let totalFiles = 0;
    for (const docId of docIds) {
      const pages = capturedDocs[docId];
      if (!pages || !Array.isArray(pages) || pages.length === 0) continue;
      const docType = DOC_TYPES.find(d => d.id === docId);
      const label = docType ? docType.label : docId;

      for (let i = 0; i < pages.length; i++) {
        const page = pages[i];
        const ext = page.file.name.split('.').pop() || 'jpg';
        // Single page: マイナンバー.jpg, Multiple pages: マイナンバー_1.jpg, マイナンバー_2.jpg
        const fileName = pages.length === 1
          ? label + '.' + ext
          : label + '_' + (i + 1) + '.' + ext;
        await uploadFileToSp(empFolder, fileName, page.file);
        totalFiles++;
      }
    }

    showToast(totalFiles + '件の書類をアップロードしました', 'success');
  } catch (e) {
    console.error('Doc upload error:', e);
    showToast('書類アップロードエラー: ' + e.message, 'error');
  }
}

async function autoAssignSyainNo() {
  const bukaVal = document.getElementById('addField_buka').value;
  const noInput = document.getElementById('addField_syainNo');
  const statusEl = document.getElementById('addSyainNoStatus');
  if (!bukaVal) { noInput.value = ''; statusEl.innerHTML = ''; return; }

  statusEl.innerHTML = '<span style="color:var(--text-light);">取得中...</span>';

  try {
    // Determine number range based on buka
    let rangeStart, rangeEnd, rangeLabel;
    if (bukaVal.indexOf('ASTI') >= 0 || bukaVal.indexOf('asti') >= 0) {
      rangeStart = 70000; rangeEnd = 79999; rangeLabel = '70000番台';
    } else if (bukaVal.indexOf('ﾕｰｼﾝ') >= 0 || bukaVal.indexOf('ユーシン') >= 0) {
      rangeStart = 60000; rangeEnd = 69999; rangeLabel = '60000番台';
    } else {
      rangeStart = 50000; rangeEnd = 59999; rangeLabel = '50000番台';
    }

    // Fetch all employee numbers in the range
    const filter = '$filter=' + F.syainNo + ' ge ' + rangeStart + ' and ' + F.syainNo + ' le ' + rangeEnd + '&$select=' + F.syainNo + '&$top=5000&$orderby=' + F.syainNo + ' desc';
    const results = await spGet(LIST_EMPLOYEES_GUID, filter);

    let nextNo = rangeStart + 1;
    if (results && results.length > 0) {
      const maxNo = results[0][F.syainNo];
      nextNo = (typeof maxNo === 'number' ? maxNo : parseInt(maxNo)) + 1;
    }

    if (nextNo > rangeEnd) {
      statusEl.innerHTML = '<span style="color:var(--danger);">⚠ ' + rangeLabel + '枠が満杯</span>';
      noInput.value = '';
      return;
    }

    noInput.value = nextNo;
    statusEl.innerHTML = '<span style="color:var(--success);">✓ ' + rangeLabel + '</span>';
  } catch (e) {
    console.error('Auto assign error:', e);
    statusEl.innerHTML = '<span style="color:var(--danger);">取得失敗</span>';
  }
}

async function saveNewEmployee() {
  const btn = document.getElementById('addEmployeeSaveBtn');
  btn.disabled = true; btn.textContent = '登録中...';

  try {
    const nameVal = document.getElementById('addField_Title').value.trim();
    const bukaSelVal = document.getElementById('addField_buka').value.trim();
    const noVal = document.getElementById('addField_syainNo').value.trim();
    if (!nameVal) { showToast('社員氏名を入力してください', 'error'); btn.disabled = false; btn.textContent = '➕ 登録'; return; }
    if (!bukaSelVal) { showToast('派遣先(部課)を選択してください', 'error'); btn.disabled = false; btn.textContent = '➕ 登録'; return; }
    if (!noVal) { showToast('社員番号を入力してください', 'error'); btn.disabled = false; btn.textContent = '➕ 登録'; return; }

    // Check duplicate
    const existing = await spGet(LIST_EMPLOYEES_GUID, '$filter=' + F.syainNo + ' eq ' + noVal + '&$top=1');
    if (existing && existing.length > 0) {
      showToast('社員番号 ' + noVal + ' は既に存在します', 'error');
      btn.disabled = false; btn.textContent = '➕ 登録';
      return;
    }

    const body = {
      Title: nameVal,
    };
    // Add syainNo
    const syainNoInternal = odataKeyToInternal(F.syainNo);
    if (syainNoInternal) body[syainNoInternal] = parseInt(noVal);
    // Add buka
    if (bukaODataKey && bukaSelVal) {
      const bukaInternal = odataKeyToInternal(bukaODataKey);
      if (bukaInternal) body[bukaInternal] = bukaSelVal;
    }

    // Collect all addField_ inputs
    PROFILE_CATEGORIES.forEach(cat => {
      cat.fields.forEach(field => {
        if (field.key.startsWith('_calc') || field.format === 'spUrl') return;

        const inputEl = document.getElementById('addField_' + field.key);
        if (!inputEl) return;
        let val = inputEl.value.trim();
        if (!val) return;

        // 派遣先 → 部課フィールドに書き込み
        let internalName;
        if (inputEl.dataset.buka === '1') {
          internalName = odataKeyToInternal(bukaODataKey);
        } else {
          const odataKey = editKeyMap[field.key];
          if (!odataKey) return;
          internalName = odataKeyToInternal(odataKey);
        }
        if (!internalName || internalName === 'Title') return;

        if (inputEl.dataset.format === 'date') {
          val = val + 'T00:00:00Z';
        } else if (inputEl.dataset.format === 'number' || inputEl.dataset.format === 'currency') {
          val = parseFloat(val);
          if (isNaN(val)) return;
        }
        body[internalName] = val;
      });
    });

    // Add entity type
    body['__metadata'] = { type: 'SP.Data.SyainListItem' };

    console.log('Creating employee:', JSON.stringify(body));
    await spCreateEmployee(body);

    // Upload captured documents to SharePoint
    if (Object.keys(capturedDocs).length > 0) {
      btn.textContent = '書類アップロード中...';
      await uploadCapturedDocs(bukaSelVal, noVal, nameVal);
    }

    showToast(nameVal + ' を登録しました', 'success');
    Object.keys(capturedDocs).forEach(k => delete capturedDocs[k]);
    resetSearch();
    switchScreen('searchScreen');

  } catch (e) {
    console.error('Add employee error:', e);
    showToast('登録エラー: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '➕ 登録';
  }
}

let hakenSelectedCols = []; // selected PROFILE_CATEGORIES ids

let bukaODataKey = null;

async function resolveBukaKey() {
  if (bukaODataKey) return bukaODataKey;
  const meta = await fetchEmployeeFields();
  if (meta) {
    const found = Object.keys(meta).find(k => meta[k].title === '部課');
    if (found) {
      bukaODataKey = (found === 'Title' || found === 'Id') ? found : 'OData_' + found;
      console.log('部課 OData key resolved:', bukaODataKey);
      return bukaODataKey;
    }
  }
  // Fallback: search employee data keys directly
  return null;
}

function getBukaValue(emp) {
  if (bukaODataKey && emp[bukaODataKey] !== undefined) {
    return (emp[bukaODataKey] || '').trim();
  }
  // Fallback: search for key containing 部課-related patterns
  const key = Object.keys(emp).find(k => k.indexOf('x90e8_') >= 0 && k.indexOf('x8ab2_') >= 0);
  if (key) {
    bukaODataKey = key;
    return (emp[key] || '').trim();
  }
  return '';
}

async function populateHakenDropdown() {
  try {
    const select = document.getElementById('hakenSelect');
    await resolveBukaKey();
    const allEmps = await spGetAll(LIST_EMPLOYEES_GUID, '$top=500');
    const bukaSet = new Set();
    allEmps.forEach(emp => {
      const b = getBukaValue(emp);
      if (b) bukaSet.add(b);
    });
    const sorted = Array.from(bukaSet).sort();
    select.innerHTML = '<option value="">派遣先(部課)を選択...</option>';
    sorted.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b;
      opt.textContent = b;
      select.appendChild(opt);
    });
  } catch (e) {
    console.error('Haken dropdown error:', e);
  }
}

let nyutaiYear = new Date().getFullYear();
let nyutaiMonth = new Date().getMonth(); // 0-based
let nyutaiRange = 1; // 1~3 months

function changeNyutaiMonth(delta) {
  nyutaiMonth += delta;
  if (nyutaiMonth > 11) { nyutaiMonth = 0; nyutaiYear++; }
  if (nyutaiMonth < 0) { nyutaiMonth = 11; nyutaiYear--; }
  loadNyutaiScreen();
}

function toggleNyutaiAnalysis() {
  const panel = document.querySelector('.nyutai-analysis-panel');
  const body = document.getElementById('nyutaiAnalysisBody');
  panel.classList.toggle('open');
  body.style.display = panel.classList.contains('open') ? 'block' : 'none';
}

function setNyutaiRange(r) {
  nyutaiRange = r;
  document.querySelectorAll('.nyutai-range-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-range')) === r);
  });
  loadNyutaiScreen();
}

function calcTenure(startDateStr, endDateStr) {
  if (!startDateStr) return '';
  const s = new Date(startDateStr);
  const e = endDateStr ? new Date(endDateStr) : new Date();
  if (isNaN(s.getTime())) return '';
  let years = e.getFullYear() - s.getFullYear();
  let months = e.getMonth() - s.getMonth();
  if (months < 0) { years--; months += 12; }
  if (years > 0 && months > 0) return years + '年' + months + 'ヶ月';
  if (years > 0) return years + '年';
  if (months > 0) return months + 'ヶ月';
  return '1ヶ月未満';
}

async function loadNyutaiScreen() {
  const label = document.getElementById('nyutaiMonthLabel');
  const summary = document.getElementById('nyutaiSummary');
  const body = document.getElementById('nyutaiBody');

  // nyutaiYear/nyutaiMonth = 基準月（表示の右端＝最新月）
  // nyutaiRange = 過去何ヶ月分表示するか
  // 開始月 = 基準月 - (range - 1)
  const startTotal = nyutaiYear * 12 + nyutaiMonth - (nyutaiRange - 1);
  const startY = Math.floor(startTotal / 12);
  const startM = ((startTotal % 12) + 12) % 12;

  if (nyutaiRange === 1) {
    label.textContent = nyutaiYear + '年' + (nyutaiMonth + 1) + '月';
  } else {
    label.textContent = startY + '年' + (startM + 1) + '月〜' + (nyutaiYear !== startY ? nyutaiYear + '年' : '') + (nyutaiMonth + 1) + '月';
  }
  summary.innerHTML = '';
  body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-light);">読み込み中...</div>';

  try {
    // Month range: startMonth to baseMonth (past → current)
    const mStart = new Date(startY, startM, 1);
    const mEnd = new Date(nyutaiYear, nyutaiMonth + 1, 0, 23, 59, 59);

    // Fetch all employees
    const allEmps = await spGetAll(LIST_EMPLOYEES_GUID, '');

    // Helper: check if date is in the target range
    function inRange(dateStr) {
      if (!dateStr) return false;
      const d = new Date(dateStr);
      return d >= mStart && d <= mEnd;
    }

    // Range of months (as year*12+month) for multi-month check
    const rangeStartM = startY * 12 + startM;
    const rangeEndM = nyutaiYear * 12 + nyutaiMonth;

    // Classify
    const nyusha = []; // 入社
    const taishaList = []; // 退社 (deduplicated, counted per rules)

    allEmps.forEach(emp => {
      const nd = emp[F.nyushaDate];
      const hd = emp[F.hakenTaisha];
      const yd = emp[F.yukyuTaisha];

      // 入社: nyushaDate within the range
      if (nd && inRange(nd)) {
        nyusha.push(emp);
      }

      // 退社カウントロジック:
      // - 派遣退社と有給退社が同日 or 同月 → その月に1カウント
      // - 有給退社が派遣退社の翌月 → 有給退社月にカウント
      // - 片方だけ → その日付の月に1カウント
      // 判定月が表示範囲内ならリストに追加
      if (hd && yd) {
        const hdDate = new Date(hd);
        const ydDate = new Date(yd);
        const hdM = hdDate.getFullYear() * 12 + hdDate.getMonth();
        const ydM = ydDate.getFullYear() * 12 + ydDate.getMonth();

        // Determine count month
        let countM;
        if (hdM === ydM) {
          countM = hdM; // 同月
        } else if (ydM === hdM + 1) {
          countM = ydM; // 有給退社が翌月 → 有給退社月
        } else {
          countM = ydM; // それ以外 → 有給退社月
        }
        if (countM >= rangeStartM && countM <= rangeEndM) {
          taishaList.push(emp);
        }
      } else if (yd) {
        if (inRange(yd)) taishaList.push(emp);
      } else if (hd) {
        if (inRange(hd)) taishaList.push(emp);
      }
    });

    // 実績 = 入社 - 退社
    const jisseki = nyusha.length - taishaList.length;

    // Summary cards (3 cards: 入社, 退社, 実績)
    const stats = [
      { label: '入社', num: nyusha.length, color: '#2e7d32' },
      { label: '退社', num: taishaList.length, color: '#c62828' },
      { label: '実績', num: jisseki, color: jisseki >= 0 ? '#1565c0' : '#e65100' },
    ];
    summary.innerHTML = stats.map(s =>
      '<div class="nyutai-stat-card" style="border-left:3px solid ' + s.color + ';">' +
      '<div class="stat-num" style="color:' + s.color + ';">' + (s.label === '実績' ? (s.num > 0 ? '+' : '') + s.num : s.num) + '</div>' +
      '<div class="stat-label">' + s.label + '</div></div>'
    ).join('');

    // Build body
    let html = '';

    if (nyutaiRange >= 7) {
      // ===== 7ヶ月以上: 月別集計テーブルのみ =====
      html += '<div class="card" style="padding:8px;margin-top:4px;">';
      html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
      html += '<thead><tr style="background:var(--primary);color:#fff;">';
      html += '<th style="padding:6px 8px;text-align:left;border-radius:6px 0 0 0;">月</th>';
      html += '<th style="padding:6px 4px;text-align:center;width:50px;">入社</th>';
      html += '<th style="padding:6px 4px;text-align:center;width:50px;">退社</th>';
      html += '<th style="padding:6px 8px;text-align:center;width:50px;border-radius:0 6px 0 0;">実績</th>';
      html += '</tr></thead><tbody>';

      for (let m = 0; m < nyutaiRange; m++) {
        const totalM = startY * 12 + startM + m;
        const yy = Math.floor(totalM / 12);
        const mm = totalM % 12;
        const ms = new Date(yy, mm, 1);
        const me = new Date(yy, mm + 1, 0, 23, 59, 59);
        const mKey = yy * 12 + mm;

        const mNyusha = nyusha.filter(e => { const d = new Date(e[F.nyushaDate]); return d >= ms && d <= me; }).length;
        const mTaisha = taishaList.filter(e => {
          const hd = e[F.hakenTaisha], yd = e[F.yukyuTaisha];
          // Re-apply count logic for this specific month
          if (hd && yd) {
            const hdM = new Date(hd).getFullYear() * 12 + new Date(hd).getMonth();
            const ydM = new Date(yd).getFullYear() * 12 + new Date(yd).getMonth();
            const countM = (hdM === ydM) ? hdM : ydM;
            return countM === mKey;
          }
          if (yd) { const d = new Date(yd); return d >= ms && d <= me; }
          if (hd) { const d = new Date(hd); return d >= ms && d <= me; }
          return false;
        }).length;
        const mJisseki = mNyusha - mTaisha;
        const isCurrentMonth = (yy === new Date().getFullYear() && mm === new Date().getMonth());
        const rowBg = isCurrentMonth ? 'background:#f0f4ff;' : (m % 2 === 0 ? '' : 'background:#fafafa;');

        html += '<tr style="' + rowBg + '">';
        html += '<td style="padding:8px;font-weight:' + (isCurrentMonth ? '800' : '600') + ';">' + (mm + 1) + '月</td>';
        html += '<td style="padding:8px;text-align:center;color:#2e7d32;font-weight:700;">' + (mNyusha || '-') + '</td>';
        html += '<td style="padding:8px;text-align:center;color:#c62828;font-weight:700;">' + (mTaisha || '-') + '</td>';
        const jColor = mJisseki > 0 ? '#1565c0' : mJisseki < 0 ? '#e65100' : 'var(--text-light)';
        html += '<td style="padding:8px;text-align:center;color:' + jColor + ';font-weight:800;">' + (mJisseki > 0 ? '+' : '') + mJisseki + '</td>';
        html += '</tr>';
      }

      // 合計行
      html += '<tr style="background:var(--bg);border-top:2px solid var(--primary);">';
      html += '<td style="padding:8px;font-weight:800;">合計</td>';
      html += '<td style="padding:8px;text-align:center;color:#2e7d32;font-weight:800;">' + nyusha.length + '</td>';
      html += '<td style="padding:8px;text-align:center;color:#c62828;font-weight:800;">' + taishaList.length + '</td>';
      const jColor2 = jisseki > 0 ? '#1565c0' : jisseki < 0 ? '#e65100' : 'var(--text-light)';
      html += '<td style="padding:8px;text-align:center;color:' + jColor2 + ';font-weight:800;">' + (jisseki > 0 ? '+' : '') + jisseki + '</td>';
      html += '</tr>';

      html += '</tbody></table></div>';

    } else {
      // ===== 1〜6ヶ月: 個別カード表示 =====

      // 入社 section
      html += '<div class="nyutai-section">';
      html += '<div class="nyutai-section-title"><span style="color:#2e7d32;">🟢</span> 入社 (' + nyusha.length + '件)</div>';
      if (nyusha.length === 0) {
        html += '<div class="nyutai-empty">この期間の入社はありません</div>';
      } else {
        nyusha.sort((a, b) => new Date(a[F.nyushaDate]) - new Date(b[F.nyushaDate]));
        nyusha.forEach(emp => {
          const dt = formatDate(emp[F.nyushaDate]);
          const name = emp.Title || '';
          const buka = getBukaValue(emp) || '';
          const isFuture = new Date(emp[F.nyushaDate]) > new Date();
          html += '<div class="nyutai-emp-card" onclick="openNyutaiEmployee(' + emp.Id + ')">';
          html += '<div class="nyutai-emp-date">' + dt.replace(/^\d{4}\//, '') + '</div>';
          html += '<div class="nyutai-emp-info"><div class="nyutai-emp-name">' + escHtml(name) + '</div><div class="nyutai-emp-buka">' + escHtml(buka) + '</div></div>';
          html += '<span class="nyutai-badge ' + (isFuture ? 'plan' : 'new') + '">' + (isFuture ? '入社予定' : '入社') + '</span>';
          html += '</div>';
        });
      }
      html += '</div>';

      // 退社 section
      html += '<div class="nyutai-section">';
      html += '<div class="nyutai-section-title"><span style="color:#c62828;">🔴</span> 退社 (' + taishaList.length + '件)</div>';
      if (taishaList.length === 0) {
        html += '<div class="nyutai-empty">この期間の退社はありません</div>';
      } else {
        taishaList.sort((a, b) => {
          const da = new Date(a[F.yukyuTaisha] || a[F.hakenTaisha]);
          const db = new Date(b[F.yukyuTaisha] || b[F.hakenTaisha]);
          return da - db;
        });
        taishaList.forEach(emp => {
          const hd = emp[F.hakenTaisha];
          const yd = emp[F.yukyuTaisha];
          const name = emp.Title || '';
          const buka = getBukaValue(emp) || '';
          const tenure = calcTenure(emp[F.nyushaDate], yd || hd);
          let dateInfo = '';
          if (hd) dateInfo += '派遣退社:' + formatDate(hd).replace(/^\d{4}\//, '');
          if (yd) dateInfo += (dateInfo ? ' ' : '') + '有給退社:' + formatDate(yd).replace(/^\d{4}\//, '');
          const displayDate = formatDate(yd || hd).replace(/^\d{4}\//, '');
          const now = new Date();
          const retDate = new Date(yd || hd);
          const isPlan = retDate > now;
          html += '<div class="nyutai-emp-card" onclick="openNyutaiEmployee(' + emp.Id + ')">';
          html += '<div class="nyutai-emp-date">' + displayDate + '</div>';
          html += '<div class="nyutai-emp-info"><div class="nyutai-emp-name">' + escHtml(name) + '</div>';
          html += '<div class="nyutai-emp-buka">' + escHtml(buka) + (tenure ? ' <span style="color:var(--primary);font-weight:600;">(' + tenure + ')</span>' : '') + '</div>';
          html += '<div style="font-size:10px;color:var(--text-light);margin-top:2px;">' + escHtml(dateInfo) + '</div></div>';
          html += '<span class="nyutai-badge ' + (isPlan ? 'plan' : 'retire') + '">' + (isPlan ? '退社予定' : '退社') + '</span>';
          html += '</div>';
        });
      }
      html += '</div>';
    }

    body.innerHTML = html;

    // ===== 分析パネル生成 =====
    renderNyutaiAnalysis(nyusha, taishaList, startY, startM);

  } catch (e) {
    console.error('Nyutai load error:', e);
    body.innerHTML = '<div class="nyutai-empty" style="color:var(--danger);">データ取得エラー: ' + escHtml(e.message) + '</div>';
  }
}

function renderNyutaiAnalysis(nyusha, taishaList, startY, startM) {
  const wrap = document.getElementById('nyutaiAnalysisWrap');
  const aBody = document.getElementById('nyutaiAnalysisBody');

  if (nyusha.length === 0 && taishaList.length === 0) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';

  let html = '';

  // ── 1. 部課別 入退内訳 ──
  html += '<div style="margin-bottom:16px;">';
  html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">📋 部課別 入退内訳</div>';

  const bukaMap = {};
  nyusha.forEach(emp => {
    const b = getBukaValue(emp) || '(未設定)';
    if (!bukaMap[b]) bukaMap[b] = { nyusha: 0, taisha: 0 };
    bukaMap[b].nyusha++;
  });
  taishaList.forEach(emp => {
    const b = getBukaValue(emp) || '(未設定)';
    if (!bukaMap[b]) bukaMap[b] = { nyusha: 0, taisha: 0 };
    bukaMap[b].taisha++;
  });

  // Sort by total descending
  const bukaArr = Object.entries(bukaMap).sort((a, b) => (b[1].nyusha + b[1].taisha) - (a[1].nyusha + a[1].taisha));

  html += '<table class="nyutai-buka-table">';
  html += '<tr><th>部課</th><th style="text-align:center;width:45px;">入社</th><th style="text-align:center;width:45px;">退社</th><th style="text-align:center;width:45px;">実績</th></tr>';
  bukaArr.forEach(([buka, d]) => {
    const j = d.nyusha - d.taisha;
    const jColor = j > 0 ? '#2e7d32' : j < 0 ? '#c62828' : 'var(--text-light)';
    html += '<tr>';
    html += '<td style="font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(buka) + '</td>';
    html += '<td style="text-align:center;color:#2e7d32;font-weight:700;">' + (d.nyusha || '-') + '</td>';
    html += '<td style="text-align:center;color:#c62828;font-weight:700;">' + (d.taisha || '-') + '</td>';
    html += '<td style="text-align:center;color:' + jColor + ';font-weight:700;">' + (j > 0 ? '+' : '') + j + '</td>';
    html += '</tr>';
  });
  html += '</table></div>';

  // ── 2. 月別推移グラフ（横棒） ──
  html += '<div>';
  html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">📈 月別推移</div>';

  // Collect monthly data
  const monthlyData = [];
  let maxVal = 1;
  for (let m = 0; m < nyutaiRange; m++) {
    const totalM = startY * 12 + startM + m;
    const yy = Math.floor(totalM / 12);
    const mm = totalM % 12;
    const ms = new Date(yy, mm, 1);
    const me = new Date(yy, mm + 1, 0, 23, 59, 59);
    const mKey = yy * 12 + mm;

    const mN = nyusha.filter(e => { const d = new Date(e[F.nyushaDate]); return d >= ms && d <= me; }).length;
    const mT = taishaList.filter(e => {
      const hd = e[F.hakenTaisha], yd = e[F.yukyuTaisha];
      if (hd && yd) {
        const hdM = new Date(hd).getFullYear() * 12 + new Date(hd).getMonth();
        const ydM = new Date(yd).getFullYear() * 12 + new Date(yd).getMonth();
        return ((hdM === ydM) ? hdM : ydM) === mKey;
      }
      if (yd) { const d = new Date(yd); return d >= ms && d <= me; }
      if (hd) { const d = new Date(hd); return d >= ms && d <= me; }
      return false;
    }).length;

    monthlyData.push({ label: (mm + 1) + '月', n: mN, t: mT });
    if (mN > maxVal) maxVal = mN;
    if (mT > maxVal) maxVal = mT;
  }

  monthlyData.forEach(d => {
    const nPct = Math.round((d.n / maxVal) * 100);
    const tPct = Math.round((d.t / maxVal) * 100);
    html += '<div style="margin-bottom:8px;">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px;">' + d.label + '</div>';
    // 入社 bar
    html += '<div class="nyutai-chart-bar-wrap">';
    html += '<div class="nyutai-chart-label" style="color:#2e7d32;">入社</div>';
    html += '<div class="nyutai-chart-bar-bg"><div class="nyutai-chart-bar" style="width:' + nPct + '%;background:linear-gradient(90deg,#66bb6a,#2e7d32);"></div></div>';
    html += '<div class="nyutai-chart-val" style="color:#2e7d32;">' + d.n + '</div>';
    html += '</div>';
    // 退社 bar
    html += '<div class="nyutai-chart-bar-wrap">';
    html += '<div class="nyutai-chart-label" style="color:#c62828;">退社</div>';
    html += '<div class="nyutai-chart-bar-bg"><div class="nyutai-chart-bar" style="width:' + tPct + '%;background:linear-gradient(90deg,#ef9a9a,#c62828);"></div></div>';
    html += '<div class="nyutai-chart-val" style="color:#c62828;">' + d.t + '</div>';
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';

async function executeTaishaSubmit(riyuu, hakenDate, yukyuDate, shahoDate, rishoku, watashi, jikai) {
  const emp = currentEmployee;
  if (!emp) return;
  const btn = document.getElementById('taishaSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }

  try {
    const fieldsMeta = await fetchEmployeeFields();
    const keyMap = buildFieldKeyMap(fieldsMeta);

    // Build body with internal field names (strip OData_ prefix)
    const body = {};

    function setField(fieldKey, value) {
      const odataKey = keyMap[fieldKey];
      if (!odataKey) { console.warn('No mapping for', fieldKey); return; }
      const internalName = odataKey.replace(/^OData_/, '');
      body[internalName] = value;
    }

    // Date fields → ISO format (use F constants for known fields)
    body[F.hakenTaisha.replace(/^OData_/, '')] = hakenDate + 'T00:00:00Z';
    body[F.yukyuTaisha.replace(/^OData_/, '')] = yukyuDate + 'T00:00:00Z';
    if (shahoDate) setField('shahoSoushitsu', shahoDate + 'T00:00:00Z');

    // Choice fields
    if (riyuu) setField('taisyokuRiyuu', riyuu);
    if (rishoku) setField('rishokuhyou', rishoku);
    if (watashi) setField('rishokuWatashi', watashi);
    if (jikai) setField('jikaiSaiyou', jikai);

    await spPatchEmployee(emp.Id, body);
    showToast('📤 退社報告を送信しました', 'success');
    closeTaishaForm();

    // Refresh employee data
    const updated = await fetchFullEmployee(emp[F.syainNo]);
    if (updated) {
      currentEmployee = updated;
      loadLeaveDetails();
    }
  } catch (e) {
    console.error('Taisha submit error:', e);
    showToast('送信に失敗しました: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📤 退社報告を送信'; }
  }
}

    const url = SP_SITE_URL + "/_api/web/lists(guid'" + LIST_EMPLOYEES_GUID + "')/items(" + empId + ")";

      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json;odata=verbose' }
